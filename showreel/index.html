<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>ZSIZART — Showreel</title>
  <meta name="robots" content="index, follow">
  <meta name="description" content="ZSIZART Studio showreel.">

  <style>
    :root{
      --bg:#0a0a0a;
      --ink:#ffffff;
      --muted:rgba(255,255,255,.72);
      --line:rgba(255,255,255,.14);
    }

    *{box-sizing:border-box}
    html,body{margin:0}
    body{
      background:var(--bg);
      color:var(--ink);
      font:16px/1.5 Inter,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
    }

    .topbar{
      position:fixed;
      top:0;
      left:0;
      right:0;
      z-index:10;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:16px;
      padding:18px 22px;
      background:linear-gradient(180deg, rgba(0,0,0,.55), rgba(0,0,0,0));
    }

    .topbar a{
      color:#fff;
      text-decoration:none;
      display:inline-flex;
      align-items:center;
      gap:10px;
      min-height:44px;
      padding:0 16px;
      border-radius:999px;
      border:1px solid var(--line);
      background:rgba(255,255,255,.08);
      backdrop-filter:blur(10px);
      font-size:12px;
      font-weight:900;
      letter-spacing:.12em;
      text-transform:uppercase;
    }

    .label{
      color:var(--muted);
      font-size:12px;
      font-weight:800;
      letter-spacing:.16em;
      text-transform:uppercase;
    }

    .video-wrap{
      width:100%;
      height:100vh;
      background:#000;
    }

    .video-wrap video{
      width:100%;
      height:100%;
      object-fit:contain;
      background:#000;
    }
  </style>
</head>
<body>
  <div class="topbar">
    <a href="/">← Back</a>
    <div class="label">Showreel</div>
  </div>

  <div class="video-wrap">
    <video controls autoplay playsinline poster="/assets/hero-poster.webp">
      <source src="/assets/zsizart-canopy-villa-web.mp4" type="video/mp4">
    </video>
  </div>
</body>
</html>
