<!DOCTYPE html>
<html lang="en" oncontextmenu="return false">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>ZSIZART — Work</title>

  <link rel="canonical" href="https://zsizart.com/work">
  <meta name="robots" content="index, follow">
  <meta name="description" content="Selected architectural visualization work by ZSIZART Studio for real estate and interior design." />
  <meta name="theme-color" content="#0b0d0d" />

  <!-- Font -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

  <!-- Favicon -->
  <link rel="icon" type="image/png" sizes="32x32" href="assets/favicon.png">
  <link rel="icon" type="image/x-icon" href="assets/favicon.ico">

  <!-- Lenis Smooth Scrolling -->
  <script defer src="https://cdn.jsdelivr.net/gh/studio-freight/lenis@1.0.29/dist/lenis.min.js"></script>

  <style>
    :root{
      --bg:#0b0d0d;
      --card:#141414;
      --ink:#e9edf0;
      --muted:#9fb3c8;
      --accent1:#ff7a18;
      --accent2:#a855f7;
      --radius:18px;
      --shadow:0 12px 40px rgba(0,0,0,.35);
      --max:1160px;

      --pv-dur:.45s;
      --pv-ease:cubic-bezier(.4,.14,.3,1);
      --rev-dur:.7s;
      --rev-ease:cubic-bezier(.2,.65,.15,1);
    }

    *{box-sizing:border-box}
    *{caret-color:transparent}
    input,textarea,select{caret-color:auto}

    html{scroll-behavior:smooth}
    html.lenis,html.lenis body{height:auto}
    .lenis.lenis-smooth{scroll-behavior:unset}

    body{
      margin:0;
      background:var(--bg);
      color:var(--ink);
      font:16px/1.6 system-ui,Segoe UI,Roboto,Helvetica,Arial;
      overflow-x:hidden;
      -webkit-tap-highlight-color: transparent;
    }

    img{display:block;max-width:100%}
    a{color:inherit;text-decoration:none}
    .wrap{max-width:var(--max);margin:auto;padding:28px}

    /* ===== Header (index style) ===== */
    header{
      position:sticky;top:0;z-index:70;
      background:rgba(5,7,9,.92);
      backdrop-filter:saturate(160%) blur(10px);
      border-bottom:1px solid #0e1116;
      box-shadow:0 8px 30px rgba(0,0,0,.35);
      transition:transform .4s ease;
    }

    header .wrap{ padding:20px 32px; }

    .header-layout{
      display:flex;
      align-items:center;
      justify-content:space-between;
    }

    .brand{
      display:flex;
      align-items:center;
      gap:14px;
      user-select:none;
      cursor:default;
    }
    .brand .logo{height:46px;width:auto;}
    .brand .wordmark{
      font-family:"Inter",system-ui,Segoe UI,Roboto,Helvetica,Arial;
      font-weight:800;
      letter-spacing:.08em;
      font-size:20px;
      text-transform:uppercase;
    }

    .menu-btn{
      width:44px;height:34px;
      border:none;background:transparent;
      color:#cfe2ff;
      display:flex;align-items:center;justify-content:center;
      cursor:pointer;
    }
    .menu-btn .bars,.menu-btn .bars::before,.menu-btn .bars::after{
      content:"";
      display:block;
      width:18px;height:2.5px;
      background:#cfe2ff;border-radius:2px;
      position:relative;
      transition:.25s;
    }
    .menu-btn .bars::before{position:absolute;top:-6px}
    .menu-btn .bars::after{position:absolute;top:6px}

    .overlay{
      position:fixed;inset:0;
      background:rgba(0,0,0,.35);
      backdrop-filter:blur(2px);
      opacity:0;pointer-events:none;
      transition:.25s;
      z-index:80
    }

    .menu-panel{
      position:fixed;top:0;right:0;height:100%;
      width:min(360px,90vw);
      background:rgba(0,0,0,.88);
      border-left:1px solid #1a1f27;
      box-shadow:-20px 0 50px rgba(0,0,0,.4);
      transform:translateX(100%);
      transition:.3s;
      z-index:90;
      display:flex;
      flex-direction:column;
      padding:40px 28px
    }
    .menu-panel a{
      font-size:20px;
      font-weight:700;
      color:#fff;
      margin:10px 0;
      transition:color .25s ease
    }
    .menu-panel a:hover{color:var(--accent1)}
    .menu-open .overlay{opacity:1;pointer-events:auto}
    .menu-open .menu-panel{transform:translateX(0)}

    .menu-open .menu-btn .bars{background:transparent}
    .menu-open .menu-btn .bars::before,
    .menu-open .menu-btn .bars::after{opacity:0}
    .menu-open .menu-btn::after{
      content:"";
      display:block;
      width:24px;height:24px;
      background:url('assets/logo.png') center/contain no-repeat;
      animation:popIn .45s var(--rev-ease);
    }
    @keyframes popIn{from{transform:scale(.6);opacity:.2}to{transform:scale(1);opacity:1}}

    /* ===== Page head (dark style) ===== */
    .page-head{ padding:18px 0 6px; }
    .page-kicker{
      color:var(--muted);
      font-size:13px;
      letter-spacing:.06em;
      text-transform:uppercase;
      margin:0 0 10px;
    }
    .page-title{
      font-size:40px;
      line-height:1.12;
      letter-spacing:-0.02em;
      margin:0;
      font-weight:800;
      background:linear-gradient(135deg,var(--accent1),var(--accent2));
      -webkit-background-clip:text;
      background-clip:text;
      color:transparent;
    }
    .page-sub{
      margin:10px 0 0;
      color:var(--muted);
      max-width:72ch;
      font-size:16px;
    }

    /* ===== Filter Panel (index style) ===== */
    .filter-panel{
      position:sticky; top:64px; z-index:60;
      margin:18px 0 0 0;
      background:rgba(0,0,0,.55);
      border:1px solid #1a1f27;
      border-radius:14px;
      padding:14px;
      display:none;
    }
    .filter-panel.show{display:block}
    .filter-row{
      display:flex;
      flex-wrap:wrap;
      gap:12px;
      align-items:center;
    }
    .chip{
      display:inline-flex;
      align-items:center;
      gap:8px;
      padding:8px 12px;
      border:1px solid #2a3140;
      border-radius:12px;
      background:#0c0e12;
      color:#e9edf0;
      cursor:pointer;
      user-select:none;
    }
    .chip input{accent-color:#1a68ff}
    .search-input{
      flex:1;
      min-width:220px;
      padding:10px 12px;
      border:1px solid #2a3140;
      border-radius:10px;
      background:#0c0e12;
      color:#e9edf0;
    }
    .filter-actions{
      margin-left:auto;
      display:flex;
      gap:10px;
    }
    .btn{
      padding:10px 12px;
      border-radius:10px;
      border:1px solid #2a3140;
      background:#0e1116;
      color:#e9edf0;
      cursor:pointer;
      font-weight:600;
    }
    .btn.primary{
      background:linear-gradient(135deg,var(--accent1),var(--accent2));
      border-color:transparent;
      color:#fff;
    }
    .btn.primary:hover{filter:brightness(1.06)}

    /* ===== Section row ===== */
    .section-row{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:14px;
    }
    section h2{
      margin:26px 0 18px;
      font-size:28px;
      font-weight:800;
    }
    .inline-btn{
      padding:8px 12px;
      border-radius:10px;
      border:1px solid #2a3140;
      background:#0e1116;
      color:#cfe2ff;
      font-weight:800;
      cursor:pointer;
    }

    /* ===== Grid (index style) ===== */
    .grid{
      display:grid;
      gap:28px;
      grid-template-columns:repeat(2,1fr);
    }
    @media(max-width:768px){ .grid{grid-template-columns:1fr;} }

    .tile{
      position:relative;
      overflow:hidden;
      background:transparent;
      cursor:pointer;
      border:none;
      border-radius:0;
      box-shadow:none;
      --mx:-1000px; --my:-1000px; --r:0px;
    }

    .label{
      position:absolute;
      left:10px;
      top:10px;
      background:#0e1116cc;
      border:1px solid #1a1f27;
      padding:4px 8px;
      border-radius:10px;
      font-size:12px;
      color:var(--ink);
    }

    /* B/W → color hover */
    .grid .tile .img-main{
      width:100%;
      height:auto;
      object-fit:cover;
      display:block;
      filter:grayscale(100%) saturate(0.6) contrast(1.05);
      transition:filter .35s ease, transform .35s ease;
    }
    .grid .tile:hover .img-main{ filter:none; transform:scale(1.02) }
    @media(hover:none){ .grid .tile:active .img-main{ filter:none } }

    /* Optional clay overlay support (safe to keep even if no clay images exist) */
    .tile .img-clay{
      position:absolute; inset:0;
      width:100%; height:100%;
      object-fit:cover;
      opacity:0;
      transition:opacity .25s ease;
      -webkit-mask: radial-gradient(circle var(--r) at var(--mx) var(--my), #000 98%, transparent 100%);
              mask: radial-gradient(circle var(--r) at var(--mx) var(--my), #000 98%, transparent 100%);
      pointer-events:none;
    }
    .tile:hover .img-clay{opacity:1}

    /* ===== Footer (index style) ===== */
    footer{
      border-top:1px solid #1a1f27;
      color:var(--muted);
      padding:20px;
      text-align:center;
      margin-top:18px;
    }

    /* ===== Project Viewer (index style) ===== */
    .pv{
      position:fixed;
      inset:0;
      z-index:200;
      background:#000;
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      opacity:0;
      pointer-events:none;
      transition:opacity var(--pv-dur) var(--pv-ease);
    }
    .pv.show{opacity:1;pointer-events:auto}
    .pv__content{position:relative;width:100%;height:100%}
    .pv__image{position:absolute;inset:0;display:flex;align-items:center;justify-content:center}
    .pv__img{
      position:absolute; inset:0;
      width:100vw; height:100vh;
      object-fit:contain;
      opacity:0;
      transition:opacity .5s ease;
      will-change:opacity,transform;
    }
    .pv__img.is-top{opacity:1;animation:pvIn var(--pv-dur) var(--pv-ease)}
    @keyframes pvIn{from{transform:translateY(-40px);opacity:.9}to{transform:translateY(0);opacity:1}}

    .pv__info{
      position:absolute; left:0;right:0;bottom:0;
      padding:22px 28px;
      font-size:15px;
      line-height:1.5;
      color:#fff;
      text-shadow:0 2px 6px rgba(0,0,0,.7);
      transform:translateY(100%);
      opacity:0;
      transition:transform var(--pv-dur) var(--pv-ease),opacity var(--pv-dur) var(--pv-ease);
    }
    .pv.show .pv__info{transform:translateY(0);opacity:1}

    .pv__close{
      position:absolute; top:14px; left:14px;
      width:40px; height:40px;
      border-radius:10px;
      background:rgba(0,0,0,.45);
      border:1px solid #1a1f27;
      color:#fff;
      font-size:26px;
      line-height:1;
      cursor:pointer;
      display:flex;
      align-items:center;
      justify-content:center;
      box-shadow:0 6px 20px rgba(0,0,0,.35);
      z-index:15;
    }
    .pv__close:hover{background:rgba(0,0,0,.6)}

    .pv__arrow{
      position:absolute;
      top:50%;
      transform:translateY(-50%);
      width:64px;
      height:64px;
      font-size:44px;
      border-radius:50%;
      border:none;
      cursor:pointer;
      background:rgba(0,0,0,.45);
      color:#fff;
      z-index:10;
      backdrop-filter:blur(4px);
      transition:.25s;
    }
    .pv__arrow:hover{ background:rgba(0,0,0,.7); }
    .pv__prev{ left:20px; }
    .pv__next{ right:20px; }
    @media(max-width:768px){
      .pv__arrow{ width:48px;height:48px;font-size:34px; }
    }
  </style>
</head>

<body>
  <!-- Header (index style) -->
  <header>
    <div class="wrap header-layout">
      <div class="brand">
        <img src="assets/logo.png" alt="ZSIZART Logo" class="logo" width="46" height="46" loading="eager" decoding="async">
        <span class="wordmark">ZSIZART</span>
      </div>
      <div class="actions">
        <button class="menu-btn" id="menuBtn" aria-label="Menu" aria-expanded="false"><span class="bars"></span></button>
      </div>
    </div>
  </header>

  <div class="overlay" id="overlay"></div>
  <aside class="menu-panel" id="menuPanel" aria-label="Site menu">
    <a href="/work.html">Work</a>
    <a href="/services.html">Services</a>
    <a href="/art.html">Art</a>
    <a href="/studio.html">Studio</a>
    <a href="/contact.html">Contact</a>
  </aside>

  <main class="wrap">
    <section class="page-head" aria-label="Page intro">
      <p class="page-kicker">Selected</p>
      <h1 class="page-title">Work</h1>
      <p class="page-sub">Architectural visualization for real estate developers and interior designers.</p>
    </section>

    <!-- Filter Panel -->
    <section id="filters" class="filter-panel" aria-label="Search and filter">
      <form id="filterForm" onsubmit="return false;">
        <div class="filter-row">
          <input class="search-input" type="search" id="q" placeholder="Search projects by name…" />
          <label class="chip"><input type="checkbox" id="tagInterior" /> INTERIOR</label>
          <label class="chip"><input type="checkbox" id="tagExterior" /> EXTERIOR</label>
          <div class="filter-actions">
            <button type="button" class="btn" id="resetBtn">Reset</button>
            <button type="button" class="btn primary" id="applyBtn">Apply</button>
          </div>
        </div>
      </form>
    </section>

    <section aria-label="Projects">
      <div class="section-row">
        <h2>Projects</h2>
        <button class="inline-btn" id="filterToggle" type="button">Search & Filter</button>
      </div>

      <div class="grid" id="grid">
        <div class="tile" data-project="assets/work-01" data-title="Verde Crest Villas" data-desc="Luxury Residential Development — Concept & Visualization." data-tags="exterior">
          <span class="label">EXTERIOR</span>
          <img class="img-main" src="assets/work-01.webp" width="1600" height="900" loading="eager" fetchpriority="high" decoding="async" alt="Verde Crest Villas">
        </div>

        <div class="tile" data-project="assets/work-02" data-title="Hillside Serenity" data-desc="A modern retreat in nature blending architecture and landscape." data-tags="exterior">
          <span class="label">EXTERIOR</span>
          <img class="img-main" src="assets/work-02.webp" width="1600" height="900" loading="lazy" decoding="async" alt="Hillside Serenity">
        </div>

        <div class="tile" data-project="assets/work-03" data-title="Retro Home Sweet" data-desc="Interior CGI capturing warmth of retro modern living." data-tags="interior">
          <span class="label">INTERIOR</span>
          <img class="img-main" src="assets/work-03.webp" width="1600" height="900" loading="lazy" decoding="async" alt="Retro Home Sweet">
        </div>

        <div class="tile" data-project="assets/work-04" data-title="Serene Lines" data-desc="Interior CGI focused on light, material and calm composition." data-tags="interior">
          <span class="label">INTERIOR</span>
          <img class="img-main" src="assets/work-04.webp" width="1600" height="900" loading="lazy" decoding="async" alt="Serene Lines">
        </div>

        <div class="tile" data-project="assets/work-05" data-title="Modern Haven" data-desc="Interior CGI capturing warmth of modern living." data-tags="interior">
          <span class="label">INTERIOR</span>
          <img class="img-main" src="assets/work-05.webp" width="1600" height="900" loading="lazy" decoding="async" alt="Modern Haven">
        </div>
      </div>
    </section>
  </main>

  <footer>© 2026 ZSIZART Studio — Architectural Visualization & CGI</footer>

  <!-- Project Viewer -->
  <div class="pv" id="pv" aria-hidden="true" role="dialog" aria-label="Project viewer">
    <div class="pv__content">
      <button class="pv__close" id="pvClose" aria-label="Close viewer">&times;</button>

      <div class="pv__image">
        <button class="pv__arrow pv__prev" id="pvPrev" aria-label="Previous image">‹</button>

        <img id="pvImageA" class="pv__img is-top" alt="">
        <img id="pvImageB" class="pv__img" alt="">

        <button class="pv__arrow pv__next" id="pvNext" aria-label="Next image">›</button>
      </div>

      <aside class="pv__info">
        <h3 id="pvTitle"></h3>
        <p id="pvDesc"></p>
      </aside>
    </div>
  </div>

  <script defer>
    /* ===== Lenis ===== */
    let lenis;
    function initLenis(){
      const prefersReducedMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
      if (prefersReducedMotion) return;
      if (!window.Lenis) return;

      lenis = new Lenis({
        duration:1.2,
        easing:(t)=>Math.min(1,1.001 - Math.pow(2, -10*t)),
        direction:'vertical',
        gestureDirection:'vertical',
        smooth:true, mouseMultiplier:1, smoothTouch:false, touchMultiplier:2, infinite:false,
      });

      function raf(time){ lenis.raf(time); requestAnimationFrame(raf); }
      requestAnimationFrame(raf);
    }
    window.addEventListener('load', initLenis);

    /* ===== Menu ===== */
    const body=document.body,
          menuBtn=document.getElementById('menuBtn'),
          overlay=document.getElementById('overlay'),
          menuPanel=document.getElementById('menuPanel');

    function openMenu(){ body.classList.add('menu-open'); menuBtn?.setAttribute('aria-expanded','true'); }
    function closeMenu(){ body.classList.remove('menu-open'); menuBtn?.setAttribute('aria-expanded','false'); }

    menuBtn?.addEventListener('click', openMenu);
    overlay?.addEventListener('click', closeMenu);
    menuPanel?.addEventListener('click',e=>{ if(e.target.tagName==='A') closeMenu(); });

    /* ===== Filter Panel ===== */
    const filterToggle=document.getElementById('filterToggle');
    const filterPanel=document.getElementById('filters');
    filterToggle?.addEventListener('click',()=>filterPanel.classList.toggle('show'));

    /* ===== Filtering ===== */
    const applyBtn=document.getElementById('applyBtn');
    const resetBtn=document.getElementById('resetBtn');
    const qInput=document.getElementById('q');
    const chkInt=document.getElementById('tagInterior');
    const chkExt=document.getElementById('tagExterior');
    const tiles=[...document.querySelectorAll('#grid .tile')];

    function applyFilters(){
      const q=(qInput?.value||'').trim().toLowerCase();
      const wantInt=!!chkInt?.checked, wantExt=!!chkExt?.checked;

      tiles.forEach(tile=>{
        const name=(tile.dataset.title||'').toLowerCase();
        const tags=(tile.dataset.tags||'').toLowerCase();
        const matchText = q ? name.includes(q) : true;
        let matchCat = true;

        if (wantInt || wantExt){
          matchCat = (wantInt && tags.includes('interior')) || (wantExt && tags.includes('exterior'));
        }
        tile.style.display = (matchText && matchCat) ? '' : 'none';
      });
    }

    function resetFilters(){
      if(qInput) qInput.value='';
      if(chkInt) chkInt.checked=false;
      if(chkExt) chkExt.checked=false;
      tiles.forEach(t=>t.style.display='');
    }

    applyBtn?.addEventListener('click',applyFilters);
    resetBtn?.addEventListener('click',resetFilters);
    qInput?.addEventListener('keydown',e=>{ if(e.key==='Enter'){ e.preventDefault(); applyFilters(); }});

    /* ===== Clay hover circle (optional) ===== */
    (function(){
      const supportsMask = window.CSS && (
        CSS.supports('(-webkit-mask:radial-gradient(circle 10px at 5px 5px, #000 98%, transparent))') ||
        CSS.supports('(mask:radial-gradient(circle 10px at 5px 5px, #000 98%, transparent))')
      );
      if(!supportsMask) return;

      const exts = ['.webp','.jpg','.png'];
      const RADIUS = 80;
      const tiles = [...document.querySelectorAll('#grid .tile')];

      tiles.forEach(tile=>{
        const base = tile.dataset.project || '';
        if(!base) return;

        const cand = exts.map(ext=>`${base}-clay${ext}`);
        const imgClay = new Image();
        imgClay.className = 'img-clay';
        imgClay.loading = 'lazy';
        imgClay.decoding = 'async';

        (function tryNext(i=0){
          if(i>=cand.length) return;
          imgClay.onload = ()=>{ tile.appendChild(imgClay); bind(); };
          imgClay.onerror = ()=> tryNext(i+1);
          imgClay.src = cand[i];
        })();

        function bind(){
          tile.addEventListener('pointerenter', ()=>{ tile.style.setProperty('--r', RADIUS+'px'); });
          tile.addEventListener('pointerleave', ()=>{
            tile.style.setProperty('--r','0px');
            tile.style.setProperty('--mx','-1000px');
            tile.style.setProperty('--my','-1000px');
          });
          tile.addEventListener('pointermove', (e)=>{
            const rect=tile.getBoundingClientRect();
            tile.style.setProperty('--mx',(e.clientX-rect.left)+'px');
            tile.style.setProperty('--my',(e.clientY-rect.top)+'px');
          }, {passive:true});
        }
      });
    })();

    /* ===== Project Viewer ===== */
    (function(){
      const viewer  = document.getElementById('pv'),
            imgA    = document.getElementById('pvImageA'),
            imgB    = document.getElementById('pvImageB'),
            titleEl = document.getElementById('pvTitle'),
            descEl  = document.getElementById('pvDesc'),
            btnClose= document.getElementById('pvClose'),
            btnPrev = document.getElementById('pvPrev'),
            btnNext = document.getElementById('pvNext');

      const projectTiles = [...document.querySelectorAll('#grid .tile')];
      const projects = projectTiles.map(t => ({
        base:t.dataset.project,
        title:t.dataset.title||'',
        desc:t.dataset.desc||''
      }));

      let list = [], idx = 0, topIsA = true;
      const cache = new Map();

      function updateArrows(){
        const multi = (list.length > 1);
        btnPrev.style.display = multi ? '' : 'none';
        btnNext.style.display = multi ? '' : 'none';
        btnPrev.disabled = !multi;
        btnNext.disabled = !multi;
      }

      function show(src){
        const top   = topIsA ? imgA : imgB;
        const under = topIsA ? imgB : imgA;

        under.onload = () => {
          top.classList.remove('is-top');
          under.classList.add('is-top');
          topIsA = !topIsA;
          under.onload = null;
        };
        under.src = src;
      }

      function setIdx(i){
        if (!list.length) return;
        idx = (i + list.length) % list.length;
        show(list[idx]);
      }

      const nextImg = () => setIdx(idx+1);
      const prevImg = () => setIdx(idx-1);

      btnNext?.addEventListener('click', (e)=>{ e.preventDefault(); e.stopPropagation(); nextImg(); });
      btnPrev?.addEventListener('click', (e)=>{ e.preventDefault(); e.stopPropagation(); prevImg(); });

      async function buildList(base){
        if (cache.has(base)) return cache.get(base);

        const exts = ['.webp','.jpg','.jpeg','.png'];
        const tryList = [];

        exts.forEach(ext => tryList.push(`${base}${ext}`));
        for(let i=1;i<=15;i++){
          const p2 = String(i).padStart(2,'0');
          exts.forEach(ext=>{
            tryList.push(`${base}-${p2}${ext}`);
            tryList.push(`${base}-${i}${ext}`);
          });
        }
        exts.forEach(ext=>{
          tryList.push(`${base}-sh${ext}`);
          tryList.push(`${base}-clay${ext}`);
          tryList.push(`${base}-alt${ext}`);
          tryList.push(`${base}-extra${ext}`);
        });

        const checks = tryList.map(src=>new Promise(res=>{
          const im=new Image();
          im.onload = ()=>res(src);
          im.onerror= ()=>res(null);
          im.src = src;
        }));

        const found=(await Promise.all(checks)).filter(Boolean);
        const finalList = found.length ? found : [`${base}.webp`];

        cache.set(base, finalList);
        return finalList;
      }

      async function openProject(i){
        const p = projects[i];

        titleEl.textContent = p.title || '';
        descEl.textContent  = p.desc  || '';

        list = await buildList(p.base);
        idx = 0;

        imgA.classList.remove('is-top'); imgB.classList.remove('is-top');
        const currentTop = topIsA ? imgA : imgB;
        currentTop.src = list[0];
        currentTop.classList.add('is-top');

        updateArrows();
      }

      function openPV(){
        viewer.classList.add('show');
        viewer.setAttribute('aria-hidden','false');
        document.body.style.overflow='hidden';
        if (lenis) lenis.stop();
      }

      function closePV(){
        viewer.classList.remove('show');
        viewer.setAttribute('aria-hidden','true');
        document.body.style.overflow='';
        if (lenis) lenis.start();
      }

      projectTiles.forEach((tile,i)=>{
        tile.addEventListener('click', async ()=>{
          await openProject(i);
          openPV();
        });
      });

      viewer.addEventListener('click',e=>{ if(e.target===viewer) closePV(); });
      btnClose?.addEventListener('click', closePV);

      document.addEventListener('keydown',e=>{
        if(!viewer.classList.contains('show'))return;
        if(e.key==='Escape') closePV();
        if(e.key==='ArrowRight') nextImg();
        if(e.key==='ArrowLeft')  prevImg();
        if(e.key==='ArrowDown'||e.key==='PageDown') nextImg();
        if(e.key==='ArrowUp'||e.key==='PageUp') prevImg();
      });
    })();
  </script>
</body>
</html>
