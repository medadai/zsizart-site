<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZSIZART Studio — Architectural Visualization & CGI</title>
    
    <!-- SEO / SOCIAL -->
    <meta name="description" content="ZSIZART Studio delivers premium architectural visualization, photorealistic rendering, and CGI for global architectural and development projects.">
    <link rel="canonical" href="https://zsizart.com/">
    <meta property="og:title" content="ZSIZART — Visualization Studio">
    <meta property="og:description" content="Cinematic architectural imagery, animation, and product CGI.">
    <meta property="og:type" content="website">
    <meta property="og:image" content="assets/og-cover.jpg">
    <meta name="theme-color" content="#ffffff">
    <meta name="twitter:card" content="summary_large_image">
    
    <!-- FAVICON -->
    <link rel="icon" type="image/png" sizes="32x32" href="assets/favicon.png">
    
    <!-- FONTS -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
<style>

:root{
--background:#ffffff;
--foreground:#000000;
--accent:#ff7a18;
--accent-dark:#e06300;
--gray-light:#f8f8f8;
--gray-dark:#eaeaea;
--transition:all .4s cubic-bezier(.16,1,.3,1);
}

*{
box-sizing:border-box;
margin:0;
padding:0;
}

body{
background:var(--background);
color:var(--foreground);
font-family:'Inter',sans-serif;
scroll-behavior:smooth;
overflow-x:hidden;
line-height:1.6;
}

.container{
max-width:1200px;
margin:0 auto;
padding:0 2rem;
}

.section-padding{
padding:6rem 0;
}

.section-title{
font-size:2.5rem;
margin-bottom:3rem;
}

.btn{
display:inline-block;
padding:.8rem 1.8rem;
background:var(--accent);
color:#fff;
text-decoration:none;
}

/* HEADER */

header{
position:fixed;
top:0;
width:100%;
background:#fff;
padding:1.5rem 0;
z-index:100;
}

.logo img{
height:32px;
}

/* HERO */

.hero{
height:100vh;
display:flex;
align-items:center;
position:relative;
}

.hero-bg{
position:absolute;
inset:0;
background:url("assets/hero-bg.jpg") center/cover;
z-index:-1;
}

.hero-content h1{
font-size:3.5rem;
margin-bottom:1rem;
}

.hero-content p{
font-size:1.2rem;
margin-bottom:2rem;
}

/* ===================== */
/* PROJECT RAIL */
/* ===================== */

.projRail{
position:relative;
}

.rail{
display:flex;
gap:14px;
overflow-x:auto;
padding:10px 60px 20px;
scroll-snap-type:x mandatory;
scrollbar-width:none;
}

.rail::-webkit-scrollbar{display:none;}

.railCard{
flex:0 0 auto;
width:260px;
height:340px;
border-radius:12px;
overflow:hidden;
position:relative;
cursor:pointer;
background:#111;
scroll-snap-align:start;
transition:var(--transition);
}

.railCard img{
width:100%;
height:100%;
object-fit:cover;
transition:var(--transition);
}

.railCard:hover img{
transform:scale(1.08);
}

.railCard::after{
content:'';
position:absolute;
inset:0;
background:linear-gradient(to top,rgba(0,0,0,.6),transparent);
}

.railLabel{
position:absolute;
bottom:14px;
left:16px;
color:#fff;
font-size:13px;
z-index:2;
}

.railBtn{
position:absolute;
top:50%;
transform:translateY(-50%);
width:46px;
height:46px;
border-radius:10px;
border:none;
background:#fff;
cursor:pointer;
font-size:26px;
}

.railPrev{left:0}
.railNext{right:0}

/* ===================== */
/* PROJECT VIEWER */
/* ===================== */

.pv{
position:fixed;
inset:0;
background:#000;
display:flex;
align-items:center;
justify-content:center;
opacity:0;
pointer-events:none;
transition:.4s;
z-index:999;
}

.pv.show{
opacity:1;
pointer-events:auto;
}

.pv img{
max-width:90%;
max-height:90%;
}

.pvClose{
position:absolute;
top:20px;
left:20px;
color:#fff;
font-size:34px;
cursor:pointer;
}

/* SERVICES */

.service-card{
background:var(--gray-light);
padding:2rem;
border-radius:4px;
border:1px solid var(--gray-dark);
}

/* FOOTER */

footer{
background:var(--gray-light);
padding:4rem 0;
text-align:center;
}

</style>
</head>

<body>

<header>

<div class="container">

<div class="logo">

<img src="assets/logo.png">

</div>

</div>

</header>



<!-- HERO -->

<section class="hero">

<div class="hero-bg"></div>

<div class="container">

<div class="hero-content">

<h1>ZSIZART Studio</h1>

<p>Premium Architectural Visualization & CGI</p>

<a href="#work" class="btn">View Work</a>

</div>

</div>

</section>



<!-- PROJECTS -->

<section id="work" class="section-padding">

<div class="container">

<h2 class="section-title">Projects</h2>

<div class="projRail">

<button class="railBtn railPrev">‹</button>

<div class="rail" id="rail">



<div class="railCard"

data-project="assets/work-01.webp">

<img src="assets/work-01.webp">

<div class="railLabel">Exterior Rendering</div>

</div>



<div class="railCard"

data-project="assets/work-02.webp">

<img src="assets/work-02.webp">

<div class="railLabel">Landscape Rendering</div>

</div>



<div class="railCard"

data-project="assets/work-03.webp">

<img src="assets/work-03.webp">

<div class="railLabel">Interior Rendering</div>

</div>



<div class="railCard"

data-project="assets/work-04.webp">

<img src="assets/work-04.webp">

<div class="railLabel">Hospitality Rendering</div>

</div>



<div class="railCard"

data-project="assets/work-05.webp">

<img src="assets/work-05.webp">

<div class="railLabel">Furniture Rendering</div>

</div>



</div>

<button class="railBtn railNext">›</button>

</div>

</div>

</section>



<!-- SERVICES -->

<section class="section-padding">

<div class="container">

<h2 class="section-title">Services</h2>

<div class="service-card">

Interior, Exterior, Animation, Product Visualization

</div>

</div>

</section>



<!-- CONTACT -->

<section class="section-padding">

<div class="container">

<h2 class="section-title">Contact</h2>

<p>careers@zsizart.com</p>

</div>

</section>



<footer>

<div class="container">

© 2026 ZSIZART Studio

</div>

</footer>



<!-- VIEWER -->

<div class="pv" id="viewer">

<div class="pvClose" id="close">×</div>

<img id="viewerImg">

</div>



<script>

rail=document.getElementById("rail")

document.querySelector(".railPrev").onclick=()=>{

rail.scrollBy({left:-300,behavior:"smooth"})

}

document.querySelector(".railNext").onclick=()=>{

rail.scrollBy({left:300,behavior:"smooth"})

}



viewer=document.getElementById("viewer")

viewerImg=document.getElementById("viewerImg")



document.querySelectorAll(".railCard")

.forEach(card=>{

card.onclick=()=>{

viewer.classList.add("show")

viewerImg.src=card.dataset.project

}

})



close.onclick=()=>{

viewer.classList.remove("show")

}



viewer.onclick=e=>{

if(e.target===viewer)

viewer.classList.remove("show")

}

</script>



</body>
</html>
