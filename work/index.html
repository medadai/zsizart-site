<!DOCTYPE html>
<html lang="en" oncontextmenu="return false">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>ZSIZART — Work</title>
  <meta name="description" content="Selected architectural visualization work by ZSIZART Studio for real estate and interior design." />
  <meta name="theme-color" content="#0b0d0d" />

  <link rel="canonical" href="https://zsizart.com/work/">
  <meta name="robots" content="index, follow">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

  <link rel="icon" type="image/png" sizes="32x32" href="/assets/favicon.png">
  <link rel="icon" type="image/x-icon" href="/assets/favicon.ico">

  <script defer src="https://cdn.jsdelivr.net/gh/studio-freight/lenis@1.0.29/dist/lenis.min.js"></script>

  <style>
    :root{
      --bg:#f5f5f4;
      --bg-2:#f7f7f6;
      --card:#ffffff;
      --ink:#0b0d0d;
      --muted:#6b7280;
      --muted-2:#a3a3a3;
      --muted-3:#bdbdbd;
      --line:#d9d9d6;
      --stroke:#e4e4e1;
      --pill:#e9e9e7;
      --radius:18px;
      --shadow:0 12px 40px rgba(0,0,0,.08);
      --max:1520px;
      --ease:cubic-bezier(.16,1,.3,1);
    }

    *{box-sizing:border-box}
    *{caret-color:transparent}
    input,textarea,select{caret-color:auto}
    html{scroll-behavior:smooth}
    html.lenis,html.lenis body{height:auto}
    .lenis.lenis-smooth{scroll-behavior:unset}

    body{
      margin:0;
      min-height:100vh;
      display:flex;
      flex-direction:column;
      background:var(--bg);
      color:var(--ink);
      font:16px/1.6 "Inter",system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
      overflow-x:hidden;
      -webkit-font-smoothing:antialiased;
      text-rendering:optimizeLegibility;
      -webkit-tap-highlight-color:transparent;
    }

    a{color:inherit;text-decoration:none}
    img{display:block;max-width:100%}
    button,input{font:inherit}

    #app{flex:1}

    .wrap{max-width:var(--max);margin:auto;padding:28px}
    .shell{width:min(calc(100% - 56px), var(--max));margin:0 auto}

    /* ===== Header ===== */
    .site-header{
      position:sticky;
      top:0;
      z-index:70;
      background:rgba(255,255,255,.78);
      backdrop-filter:saturate(160%) blur(10px);
      border-bottom:1px solid rgba(0,0,0,.08);
      box-shadow:0 8px 30px rgba(0,0,0,.08);
    }

    .site-header .wrap{padding:18px 32px}

    .header-layout{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:22px;
    }

    .brand{
      display:flex;
      align-items:center;
      gap:12px;
      user-select:none;
      white-space:nowrap;
    }

    .brand .logo{height:34px;width:auto}
    .brand .wordmark{
      font-weight:500;
      letter-spacing:.14em;
      font-size:13px;
      text-transform:uppercase;
      color:var(--ink);
    }

    .nav{
      display:flex;
      align-items:center;
      gap:22px;
      min-width:0;
    }

    .nav-link{
      font-size:13px;
      font-weight:500;
      letter-spacing:.02em;
      color:rgba(11,13,13,.78);
      padding:8px 2px;
      white-space:nowrap;
    }
    .nav-link:hover,
    .nav-link.active{color:var(--ink)}

    .cta{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      height:38px;
      padding:0 14px;
      border-radius:999px;
      border:1px solid rgba(0,0,0,.14);
      background:rgba(0,0,0,.04);
      color:var(--ink);
      font-size:13px;
      font-weight:600;
      letter-spacing:.02em;
      white-space:nowrap;
    }
    .cta:hover{
      background:rgba(0,0,0,.06);
      border-color:rgba(0,0,0,.18);
    }

    @media (max-width: 860px){
      .nav{
        gap:14px;
        overflow:auto;
        -webkit-overflow-scrolling:touch;
        scrollbar-width:none;
      }
      .nav::-webkit-scrollbar{display:none}
      .cta{display:none}
    }

    /* ===== Page ===== */
    .page{
      min-height:calc(100vh - 92px);
      opacity:0;
      transform:translateY(18px);
      animation:pageIn .65s var(--ease) forwards;
    }
    @keyframes pageIn{to{opacity:1;transform:none}}

    .grid-page,
    .list-page,
    .detail-page{
      padding-top:32px;
      padding-bottom:72px;
    }

    .subnav{
      display:flex;
      justify-content:flex-end;
      align-items:center;
      gap:18px;
      margin:0 0 34px;
      font-size:13px;
      font-weight:500;
      letter-spacing:-0.02em;
    }

    .subnav a,
    .subnav span{
      color:#6f6f6f;
      transition:color .25s ease, opacity .25s ease;
    }

    .subnav .current{color:#111}
    .subnav a:hover{color:#111}

    /* ===== Grid ===== */
    .projects-grid{
      display:grid;
      grid-template-columns:repeat(12,minmax(0,1fr));
      gap:28px;
    }

    .project-card{
      display:block;
      opacity:0;
      transform:translateY(18px);
      animation:cardIn .75s var(--ease) forwards;
    }
    @keyframes cardIn{to{opacity:1;transform:none}}

    .span-12{grid-column:span 12}
    .span-8{grid-column:span 8}
    .span-7{grid-column:span 7}
    .span-6{grid-column:span 6}
    .span-5{grid-column:span 5}
    .span-4{grid-column:span 4}

    .project-thumb{
      position:relative;
      overflow:hidden;
      background:#ececec;
      margin-bottom:16px;
      height:min(68vh, 720px);
      min-height:260px;
    }

    .project-thumb img,
    .more-card img{
      width:100%;
      height:100%;
      object-fit:cover;
      transition:transform 1.05s var(--ease), filter .8s ease;
    }

    .project-card:hover .project-thumb img,
    .more-card:hover img{transform:scale(1.05)}

    .project-overlay{
      position:absolute;
      inset:0;
      display:flex;
      align-items:center;
      justify-content:center;
      background:rgba(0,0,0,.18);
      opacity:0;
      transition:opacity .45s ease;
    }

    .project-overlay span{
      color:#fff;
      font-size:clamp(22px,2vw,32px);
      font-weight:500;
      letter-spacing:-0.02em;
      transform:translateY(14px);
      transition:transform .45s var(--ease);
    }

    .project-card:hover .project-overlay{opacity:1}
    .project-card:hover .project-overlay span{transform:none}

    .project-meta{
      display:flex;
      gap:8px;
      justify-content:space-between;
      align-items:flex-start;
      flex-wrap:wrap;
    }

    .project-title{
      margin:0;
      font-size:clamp(20px,1.7vw,28px);
      font-weight:500;
      letter-spacing:-0.03em;
      line-height:1.1;
    }

    .project-services{
      margin:2px 0 0;
      font-size:11px;
      letter-spacing:.16em;
      text-transform:uppercase;
      color:#6b6b6b;
    }

    /* ===== Lists ===== */
    .list-shell{
      border-top:1px dashed #c8c8c8;
      border-bottom:1px dashed #c8c8c8;
      padding:22px 0 130px;
    }

    .list-head{
      display:flex;
      justify-content:space-between;
      align-items:flex-start;
      gap:24px;
      margin-bottom:48px;
      flex-wrap:wrap;
    }

    .list-title{
      margin:0;
      font-size:clamp(30px,3.5vw,58px);
      line-height:.98;
      font-weight:500;
      letter-spacing:-0.05em;
    }

    .list-controls{
      display:flex;
      flex-direction:column;
      align-items:flex-end;
      gap:22px;
      margin-left:auto;
    }

    .list-viewall{
      display:inline-flex;
      align-items:center;
      gap:10px;
      padding:8px 16px;
      border-radius:999px;
      background:#e7e7e7;
      font-size:12px;
      font-weight:500;
      letter-spacing:-0.02em;
      transition:background .25s ease;
    }

    .list-viewall:hover{background:#dcdcdc}
    .list-viewall .pill-dot{width:8px;height:8px}

    .list-table{width:100%}

    .list-row{
      display:grid;
      grid-template-columns:minmax(0,1.2fr) minmax(140px,.8fr) 28px;
      gap:24px;
      align-items:center;
      padding:18px 0;
      border-bottom:1px dashed #c8c8c8;
      transition:transform .25s var(--ease), color .25s ease;
    }

    .list-row:hover{transform:translateX(8px)}

    .list-name{
      margin:0;
      font-size:clamp(20px,1.8vw,30px);
      line-height:1.05;
      font-weight:500;
      letter-spacing:-0.035em;
    }

    .list-service{
      margin:0;
      font-size:13px;
      font-weight:400;
      color:#7a7a7a;
      justify-self:start;
    }

    .list-bullet{
      width:10px;
      height:10px;
      border-radius:50%;
      border:1px solid #111;
      justify-self:end;
      transition:background .25s ease, transform .25s ease;
    }

    .list-row:hover .list-bullet{
      background:#111;
      transform:scale(1.05);
    }

    /* ===== Detail ===== */
    .detail-page{background:var(--bg-2)}

    .detail-layout{
      display:grid;
      grid-template-columns:minmax(280px, 1fr) minmax(0, 2fr);
      gap:80px;
      align-items:start;
    }

    .detail-aside{
      position:sticky;
      top:122px;
    }

    .detail-title{
      margin:0 0 48px;
      font-size:clamp(40px,5vw,86px);
      line-height:.95;
      font-weight:500;
      letter-spacing:-0.045em;
      max-width:12ch;
    }

    .detail-block + .detail-block{margin-top:40px}

    .eyebrow{
      margin:0 0 14px;
      font-size:10px;
      font-weight:500;
      letter-spacing:.18em;
      text-transform:uppercase;
      color:#6f6f6f;
    }

    .detail-copy{
      max-width:420px;
      font-size:14px;
      line-height:1.85;
      font-weight:300;
      color:#222;
    }

    .detail-copy p{margin:0 0 18px}

    .visit-link{
      display:inline-flex;
      align-items:center;
      gap:6px;
      padding-bottom:2px;
      border-bottom:1px solid #111;
      font-size:11px;
      font-weight:600;
      letter-spacing:.16em;
      text-transform:uppercase;
      transition:opacity .25s ease;
    }
    .visit-link:hover{opacity:.6}

    .facts{
      display:grid;
      grid-template-columns:repeat(2,minmax(0,1fr));
      gap:28px 20px;
    }

    .fact-value{
      margin:0;
      font-size:12px;
      font-weight:600;
      line-height:1.5;
    }

    .detail-gallery{
      display:flex;
      flex-direction:column;
      gap:36px;
    }

    .detail-image{
      overflow:hidden;
      background:#ededed;
      border:1px solid rgba(0,0,0,.02);
    }

    .detail-image img{width:100%;height:auto;object-fit:cover}

    .more-section{
      margin-top:96px;
      padding-top:40px;
      border-top:1px solid var(--line);
    }

    .more-head{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:16px;
      margin-bottom:24px;
      flex-wrap:wrap;
    }

    .more-title{
      margin:0;
      font-size:clamp(32px,3.2vw,54px);
      line-height:1;
      font-weight:500;
      letter-spacing:-0.04em;
    }

    .pill-link{
      display:inline-flex;
      align-items:center;
      gap:10px;
      padding:8px 16px;
      border:1px solid #cfcfcf;
      border-radius:999px;
      font-size:11px;
      font-weight:500;
      letter-spacing:.16em;
      text-transform:uppercase;
      transition:background .25s ease, color .25s ease, border-color .25s ease;
    }

    .pill-link:hover{
      background:#111;
      color:#fff;
      border-color:#111;
    }

    .pill-dot{
      width:6px;
      height:6px;
      border-radius:50%;
      border:1px solid currentColor;
      flex:0 0 auto;
    }

    .marquee-wrap{overflow:hidden;position:relative}

    .marquee-track{
      display:flex;
      gap:24px;
      width:max-content;
      animation:marquee 40s linear infinite;
    }

    .marquee-wrap:hover .marquee-track{animation-play-state:paused}

    @keyframes marquee{
      from{transform:translateX(0)}
      to{transform:translateX(-50%)}
    }

    .more-card{
      width:min(450px, 78vw);
      flex:0 0 auto;
      display:block;
    }

    .more-thumb{
      aspect-ratio:3/2;
      overflow:hidden;
      background:#eaeaea;
      margin-bottom:14px;
    }

    .more-card:not(:hover) img{filter:grayscale(1)}

    .more-services{
      margin:0 0 6px;
      font-size:10px;
      letter-spacing:.16em;
      text-transform:uppercase;
      color:#6f6f6f;
    }

    .more-name{
      margin:0;
      font-size:18px;
      font-weight:500;
      letter-spacing:-0.02em;
    }

    .not-found{
      min-height:50vh;
      display:grid;
      place-items:center;
      padding:80px 16px 20px;
      text-align:center;
    }

    .not-found p{
      margin:0;
      font-size:16px;
      color:#555;
    }

    /* ===== Footer ===== */
    .nam-footer{
      font-family:Inter,system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;
      background:var(--bg);
      color:var(--ink);
      padding:28px 34px 16px;
      border-top:1px solid rgba(0,0,0,.08);
    }

    .nf-top{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:16px;
      margin-bottom:46px;
    }

    .nf-brand{
      font-weight:500;
      font-size:18px;
      letter-spacing:-0.01em;
    }

    .nf-social{
      display:flex;
      gap:10px;
      align-items:center;
    }

    .nf-pill{
      display:inline-flex;
      align-items:center;
      gap:8px;
      padding:10px 14px;
      background:var(--pill);
      border:1px solid var(--stroke);
      border-radius:999px;
      color:var(--ink);
      font-size:13px;
      font-weight:500;
      line-height:1;
    }

    .nf-dot{
      width:8px;
      height:8px;
      border:1.5px solid var(--ink);
      border-radius:999px;
      display:inline-block;
      opacity:.9;
    }

    .nf-mid{
      display:grid;
      grid-template-columns:1.5fr 1fr .8fr;
      gap:28px;
      align-items:start;
      min-height:210px;
    }

    .nf-kicker{
      font-size:12px;
      color:var(--muted-2);
      margin-bottom:10px;
      font-weight:500;
    }

    .nf-form{
      display:flex;
      align-items:center;
      gap:10px;
      max-width:520px;
    }

    .nf-input{
      flex:1;
      height:44px;
      padding:0 16px;
      border-radius:999px;
      border:1px solid var(--stroke);
      background:transparent;
      outline:none;
      font-size:13px;
      color:var(--ink);
    }

    .nf-input::placeholder{color:var(--muted-3)}

    .nf-btn{
      height:44px;
      padding:0 18px;
      border-radius:999px;
      border:0;
      background:#3f3f3f;
      color:#fff;
      font-size:13px;
      font-weight:600;
      cursor:pointer;
    }

    .nf-time{justify-self:center;width:220px}
    .nf-time-row{margin-bottom:18px}

    .nf-city{
      font-size:13px;
      color:var(--muted-2);
      font-weight:500;
      margin-bottom:6px;
    }

    .nf-clock{
      font-size:15px;
      font-weight:600;
      letter-spacing:.02em;
    }

    .nf-links{
      justify-self:end;
      display:flex;
      flex-direction:column;
      gap:10px;
      text-align:left;
    }

    .nf-links a{
      color:var(--muted-2);
      font-size:14px;
      font-weight:500;
    }
    .nf-links a:hover{color:var(--ink)}

    .nf-bottom{
      display:grid;
      grid-template-columns:1fr 1fr 1fr;
      align-items:center;
      margin-top:34px;
      padding-top:18px;
    }

    .nf-muted{
      font-size:12px;
      color:var(--muted-3);
      font-weight:500;
      text-decoration:none;
    }

    .nf-center{text-align:center}
    .nf-right{text-align:right;justify-self:end}

    @media (max-width: 1024px){
      .detail-layout{grid-template-columns:1fr;gap:48px}
      .detail-aside{position:static}
      .list-row{grid-template-columns:minmax(0,1fr) minmax(120px,.7fr) 24px}
    }

    @media (max-width: 900px){
      .projects-grid{gap:24px}
      .span-8,.span-7,.span-6,.span-5,.span-4{grid-column:span 12}
      .project-thumb{height:58vh;min-height:240px}

      .nf-mid{grid-template-columns:1fr;gap:22px;min-height:auto}
      .nf-time{justify-self:start;width:auto}
      .nf-links{justify-self:start}
      .nf-bottom{grid-template-columns:1fr;gap:10px}
      .nf-center,.nf-right{text-align:left;justify-self:start}
    }

    @media (max-width: 768px){
      .shell{width:min(calc(100% - 32px), var(--max))}
      .list-head{margin-bottom:32px}
      .list-controls{width:100%;align-items:flex-start;gap:16px}
      .subnav{justify-content:flex-start;margin-bottom:22px}
      .list-row{grid-template-columns:1fr auto;gap:10px 20px;padding:16px 0}
      .list-name{grid-column:1 / 2}
      .list-service{grid-column:1 / 2;font-size:12px}
      .list-bullet{grid-column:2 / 3;grid-row:1 / span 2;align-self:center}
      .detail-gallery{gap:20px}
      .more-section{margin-top:72px}
      .marquee-track{animation-duration:28s}
      .nav a:nth-child(n+2){display:none}
    }

    @media (max-width: 520px){
      .site-header .wrap{padding:16px 18px}
      .shell{width:min(calc(100% - 24px), var(--max))}
      .project-thumb{height:44vh;min-height:220px}
      .project-meta{display:block}
      .project-services{margin-top:8px}
      .list-shell{padding:18px 0 90px}
      .facts{grid-template-columns:1fr}
      .more-card{width:78vw}
      .nam-footer{padding:22px 18px 14px}
      .nf-form{flex-direction:column;align-items:stretch}
      .nf-btn{width:100%}
    }
  </style>
</head>
<body>
  <header class="site-header">
    <div class="wrap header-layout">
      <a class="brand" href="/">
        <img src="/assets/logo.png" alt="ZSIZART Logo" class="logo" width="34" height="34" loading="eager" decoding="async">
        <span class="wordmark">ZSIZART</span>
      </a>

      <nav class="nav" aria-label="Primary">
        <a class="nav-link active" href="/work/">Work</a>
        <a class="nav-link" href="/3D-Product-Modeling/">Services</a>
        <a class="nav-link" href="/careers/">Careers</a>
        <a class="nav-link" href="/studio/">Studio</a>
        <a class="nav-link" href="/contact/">Contact</a>
      </nav>

      <a class="cta" href="/contact/">Start a Project</a>
    </div>
  </header>

  <div id="app"></div>

  <footer class="nam-footer">
    <div class="nf-top">
      <div class="nf-brand">ZSIZART Studio</div>

      <div class="nf-social">
        <a class="nf-pill" href="#" aria-label="Instagram">
          <span class="nf-dot"></span> Instagram
        </a>
        <a class="nf-pill" href="#" aria-label="LinkedIn">
          <span class="nf-dot"></span> LinkedIn
        </a>
      </div>
    </div>

    <div class="nf-mid">
      <div class="nf-col nf-newsletter">
        <div class="nf-kicker">Keep in touch with us</div>

        <form class="nf-form" id="subscribeForm" action="https://formspree.io/f/xpqjvrnn" method="POST">
          <input class="nf-input" type="email" name="email" placeholder="Email Address" required>
          <input type="hidden" name="type" value="newsletter_subscribe">
          <button class="nf-btn" type="submit">Subscribe</button>
        </form>

        <div id="subscribeOk" class="nf-muted" style="margin-top:10px; display:none;">Subscribed successfully.</div>
        <div id="subscribeErr" class="nf-muted" style="margin-top:10px; display:none;">Something went wrong. Try again.</div>
      </div>

      <div class="nf-col nf-time">
        <div class="nf-time-row">
          <div class="nf-city">Egypt</div>
          <div class="nf-clock" id="clock-eg">--:--:--</div>
        </div>
        <div class="nf-time-row">
          <div class="nf-city">Dubai</div>
          <div class="nf-clock" id="clock-dubai">--:--:--</div>
        </div>
      </div>

      <nav class="nf-col nf-links" aria-label="Footer">
        <a href="/work/">Projects</a>
        <a href="/studio/">Studio</a>
        <a href="/careers/">Careers</a>
        <a href="/contact/">Contact</a>
      </nav>
    </div>

    <div class="nf-bottom">
      <div class="nf-muted">©2026 ZSIZART Studio</div>
      <div class="nf-muted nf-center">Made by ZSIZART</div>
      <a class="nf-muted nf-right" href="#">Privacy Policy</a>
    </div>
  </footer>

  <script>
    const projects = [
      {
        id: "verde-crest-villas",
        slug: "verde-crest-villas",
        title: "Verde Crest Villas",
        services: "CGI / Film",
        client: "Sarazin, Drive Property Group",
        year: "2025",

    let lenis;
    function initLenis(){
      const prefersReducedMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
      if (prefersReducedMotion) return;
      if (!window.Lenis) return;

      lenis = new Lenis({
        duration:1.2,
        easing:(t)=>Math.min(1,1.001 - Math.pow(2, -10*t)),
        direction:'vertical',
        gestureDirection:'vertical',
        smooth:true,
        mouseMultiplier:1,
        smoothTouch:false,
        touchMultiplier:2,
        infinite:false,
      });

      function raf(time){
        lenis.raf(time);
        requestAnimationFrame(raf);
      }
      requestAnimationFrame(raf);
    }
    window.addEventListener('load', initLenis);

    const app = document.getElementById('app');

    function escapeHtml(value){
      return String(value)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
    }

    function getRoute(){
      const raw = (location.hash || '').replace(/^#/, '');
      if (!raw || raw === '/' || raw === '') {
        location.hash = '#/projects/grid';
        return null;
      }
      return raw;
    }

    function renderGrid(){
      document.title = 'ZSIZART — Work';

      const cards = projects.map((project, index) => `
        <a class="project-card ${project.width || 'span-12'}" style="animation-delay:${(index % 3) * 0.12}s" href="#/projects/${project.slug}">
          <div class="project-thumb">
            <img src="${project.coverImage}" alt="${escapeHtml(project.title)}" loading="${index > 2 ? 'lazy' : 'eager'}">
            <div class="project-overlay"><span>View Project</span></div>
          </div>
          <div class="project-meta">
            <h2 class="project-title">${escapeHtml(project.title)}</h2>
            <p class="project-services">${escapeHtml(project.services)}</p>
          </div>
        </a>
      `).join('');

      app.innerHTML = `
        <main class="page grid-page">
          <div class="shell">
            <div class="subnav">
              <span class="current">Grid</span>
              <a href="#/projects/lists">Lists</a>
            </div>
            <section class="projects-grid">${cards}</section>
          </div>
        </main>
      `;

      window.scrollTo(0,0);
    }

    function renderList(){
      document.title = 'ZSIZART — Featured work';

      const rows = projects.map((project) => `
        <a class="list-row" href="#/projects/${project.slug}">
          <h2 class="list-name">${escapeHtml(project.title)}</h2>
          <p class="list-service">${escapeHtml(project.services)}</p>
          <span class="list-bullet" aria-hidden="true"></span>
        </a>
      `).join('');

      app.innerHTML = `
        <main class="page list-page">
          <div class="shell">
            <section class="list-shell">
              <div class="list-head">
                <h1 class="list-title">Featured work</h1>
                <div class="list-controls">
                  <a class="list-viewall" href="#/projects/grid"><span class="pill-dot"></span>View all projects</a>
                  <div class="subnav">
                    <a href="#/projects/grid">Grid</a>
                    <span class="current">Lists</span>
                  </div>
                </div>
              </div>

              <div class="list-table">${rows}</div>
            </section>
          </div>
        </main>
      `;

      window.scrollTo(0,0);
    }

    function renderProject(slug){
      const project = projects.find((item) => item.slug === slug);
      if (!project) {
        renderNotFound();
        return;
      }

      document.title = `ZSIZART — ${project.title}`;

      const description = project.description
        ? `<div class="detail-block"><p class="eyebrow">Info</p><div class="detail-copy">${project.description.split('\n\n').map((p) => `<p>${escapeHtml(p)}</p>`).join('')}</div></div>`
        : '';

      const facts = [
        project.services ? `<div><p class="eyebrow">Services</p><p class="fact-value">${escapeHtml(project.services)}</p></div>` : '',
        project.client ? `<div><p class="eyebrow">Client</p><p class="fact-value">${escapeHtml(project.client)}</p></div>` : '',
        project.year ? `<div><p class="eyebrow">Year</p><p class="fact-value">${escapeHtml(project.year)}</p></div>` : '',
        project.location ? `<div><p class="eyebrow">Location</p><p class="fact-value">${escapeHtml(project.location)}</p></div>` : ''
      ].filter(Boolean).join('');

      const gallery = (project.images && project.images.length ? project.images : [project.coverImage])
        .map((src, index) => `
          <div class="detail-image">
            <img src="${src}" alt="${escapeHtml(project.title)} image ${index + 1}" loading="${index === 0 ? 'eager' : 'lazy'}">
          </div>
        `).join('');

      const trackItems = [...projects, ...projects].map((item) => `
        <a class="more-card" href="#/projects/${item.slug}">
          <div class="more-thumb"><img src="${item.coverImage}" alt="${escapeHtml(item.title)}" loading="lazy"></div>
          <p class="more-services">${escapeHtml(item.services)}</p>
          <h3 class="more-name">${escapeHtml(item.title)}</h3>
        </a>
      `).join('');

      app.innerHTML = `
        <main class="page detail-page">
          <div class="shell">
            <section class="detail-layout">
              <aside class="detail-aside">
                <h1 class="detail-title">${escapeHtml(project.title)}</h1>
                ${project.liveSite ? `<div class="detail-block"><a class="visit-link" href="${project.liveSite}" target="_blank" rel="noreferrer noopener">View live site ↗</a></div>` : ''}
                ${description}
                ${facts ? `<div class="detail-block"><div class="facts">${facts}</div></div>` : ''}
              </aside>
              <section class="detail-gallery">${gallery}</section>
            </section>

            <section class="more-section">
              <div class="more-head">
                <h2 class="more-title">More projects</h2>
                <a class="pill-link" href="#/projects/grid"><span class="pill-dot"></span>View all projects</a>
              </div>
              <div class="marquee-wrap">
                <div class="marquee-track">${trackItems}</div>
              </div>
            </section>
          </div>
        </main>
      `;

      window.scrollTo(0,0);
    }

    function renderNotFound(){
      document.title = 'ZSIZART — Not Found';
      app.innerHTML = `
        <main class="page not-found">
          <div><p>Project not found</p></div>
        </main>
      `;
      window.scrollTo(0,0);
    }

    function render(){
      const route = getRoute();
      if (route === null) return;

      if (route === '/projects' || route === '/projects/grid') {
        renderGrid();
        return;
      }

      if (route === '/projects/lists') {
        renderList();
        return;
      }

      const match = route.match(/^\/projects\/([^/?#]+)/i);
      if (match) {
        renderProject(decodeURIComponent(match[1]));
        return;
      }

      renderNotFound();
    }

    window.addEventListener('hashchange', render);
    render();

    (function(){
      const form = document.getElementById('subscribeForm');
      if (!form) return;

      const ok = document.getElementById('subscribeOk');
      const err = document.getElementById('subscribeErr');

      form.addEventListener('submit', async (e) => {
        e.preventDefault();

        if (ok) ok.style.display = 'none';
        if (err) err.style.display = 'none';

        try {
          const res = await fetch(form.action, {
            method: 'POST',
            body: new FormData(form),
            headers: { 'Accept': 'application/json' }
          });

          if (res.ok) {
            form.reset();
            if (ok) ok.style.display = 'block';
          } else {
            if (err) err.style.display = 'block';
          }
        } catch (_) {
          if (err) err.style.display = 'block';
        }
      });
    })();

    (function(){
      const fmt = (tz) => new Intl.DateTimeFormat('en-GB', {
        timeZone: tz,
        hour: '2-digit',
        minute: '2-digit',
        second: '2-digit',
        hour12: false
      });

      const eg = document.getElementById('clock-eg');
      const dubai = document.getElementById('clock-dubai');

      const tick = () => {
        const now = new Date();
        if (eg) eg.textContent = fmt('Africa/Cairo').format(now);
        if (dubai) dubai.textContent = fmt('Asia/Dubai').format(now);
      };

      tick();
      setInterval(tick, 1000);
    })();
  </script>
