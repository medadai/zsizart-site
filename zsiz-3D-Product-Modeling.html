<!DOCTYPE html>
<html lang="en" oncontextmenu="return false">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>ZSIZART — 3D Product Modeling</title>
<link rel="icon" href="../assets/favicon.png">

<style>
:root{
  --bg:#0b0d0d;
  --ink:#e9edf0;
  --muted:#9fb3c8;
  --accent1:#ff7a18;
  --accent2:#a855f7;
  --max:1500px;
}

*{box-sizing:border-box}

body{
  margin:0;
  background:var(--bg);
  color:var(--ink);
  font:16px/1.6 system-ui,Segoe UI,Roboto,Helvetica,Arial;
  overflow-x:hidden;
  -webkit-tap-highlight-color: transparent;
}

img{display:block;max-width:100%}
a{color:inherit;text-decoration:none}

.wrap{max-width:var(--max);margin:auto;padding:10px}

/* ===== Header ===== */
header{
  position:sticky;top:0;z-index:70;
  background:rgba(5,7,9,.92);
  backdrop-filter:saturate(160%) blur(10px);
  border-bottom:1px solid #0e1116;
  box-shadow:0 8px 30px rgba(0,0,0,.35);
}

header .wrap{padding:18px 32px}

.header-layout{
  display:flex;
  align-items:center;
  justify-content:space-between;
}

.brand{
  display:flex;
  align-items:center;
  gap:14px;
}

.brand .logo{height:48px}

.brand .wordmark{
  font-weight:800;
  letter-spacing:.08em;
  font-size:20px;
}

/* ===== Scroll Behavior (lighter) ===== */
main{
  scroll-snap-type:y proximity;
}

/* ===== Softer + Faster Section Transition ===== */
.project-row{
  min-height:85vh;
  height:auto;
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:12px;
  padding:20px 2vw;
  align-items:center;
  scroll-snap-align:start;

  opacity:0;
  transform:translateY(60px);
  transition:
    opacity .7s ease,
    transform .7s ease;
  will-change:opacity,transform;
}

.project-row.in-view{
  opacity:1;
  transform:translateY(0);
}

@media(max-width:900px){
  .project-row{
    grid-template-columns:1fr;
    gap:10px;
    min-height:80vh;
  }
}

/* ===== Image Compare ===== */
.stack{
  position:relative;
  cursor:pointer;
  display:flex;
  align-items:center;
  justify-content:center;
}

.layer{position:relative}

.layer img{
  width:100%;
  max-height:85vh;
  object-fit:contain;
  user-select:none;
  pointer-events:none;
}

.img-render{opacity:1}

.img-clay{
  position:absolute;
  inset:0;
  opacity:0;
  transition:opacity .4s ease;
}

@media(hover:hover){
  .stack:hover .img-clay{opacity:1}
}

.stack.is-compare .img-clay{opacity:1}
</style>
</head>

<body>

<header>
  <div class="wrap header-layout">
    <div class="brand">
      <img src="../assets/logo.png" alt="ZSIZART Logo" class="logo">
      <span class="wordmark">ZSIZART</span>
    </div>
  </div>
</header>

<main class="wrap">
  <h1>3D Product Modeling</h1>
  <p class="sub">Clay to Render — hover to compare.</p>

  <section class="project-row">
    <div class="stack">
      <div class="layer">
        <img class="img-render" src="../assets/modeling-render01.webp" loading="lazy">
        <img class="img-clay" src="../assets/modeling-clay01.webp" loading="lazy">
      </div>
    </div>
    <div class="stack">
      <div class="layer">
        <img class="img-render" src="../assets/modeling-render02.webp" loading="lazy">
        <img class="img-clay" src="../assets/modeling-clay02.webp" loading="lazy">
      </div>
    </div>
  </section>

  <section class="project-row">
    <div class="stack">
      <div class="layer">
        <img class="img-render" src="../assets/modeling-render03.webp" loading="lazy">
        <img class="img-clay" src="../assets/modeling-clay03.webp" loading="lazy">
      </div>
    </div>
    <div class="stack">
      <div class="layer">
        <img class="img-render" src="../assets/modeling-render04.webp" loading="lazy">
        <img class="img-clay" src="../assets/modeling-clay04.webp" loading="lazy">
      </div>
    </div>
  </section>

  <section class="project-row">
    <div class="stack">
      <div class="layer">
        <img class="img-render" src="../assets/modeling-render05.webp" loading="lazy">
        <img class="img-clay" src="../assets/modeling-clay05.webp" loading="lazy">
      </div>
    </div>
    <div class="stack">
      <div class="layer">
        <img class="img-render" src="../assets/modeling-render06.webp" loading="lazy">
        <img class="img-clay" src="../assets/modeling-clay06.webp" loading="lazy">
      </div>
    </div>
  </section>

  <section class="project-row">
    <div class="stack">
      <div class="layer">
        <img class="img-render" src="../assets/modeling-render07.webp" loading="lazy">
        <img class="img-clay" src="../assets/modeling-clay07.webp" loading="lazy">
      </div>
    </div>
    <div class="stack">
      <div class="layer">
        <img class="img-render" src="../assets/modeling-render08.webp" loading="lazy">
        <img class="img-clay" src="../assets/modeling-clay08.webp" loading="lazy">
      </div>
    </div>
  </section>

</main>

<script>
const sections = document.querySelectorAll(".project-row");

const observer = new IntersectionObserver(entries=>{
  entries.forEach(entry=>{
    if(entry.isIntersecting){
      entry.target.classList.add("in-view");
    } else {
      entry.target.classList.remove("in-view");
    }
  });
},{
  threshold:0.35
});

sections.forEach(section=>observer.observe(section));

document.querySelectorAll(".stack").forEach(card=>{
  card.addEventListener("click",()=>{
    card.classList.toggle("is-compare");
  });
});
</script>

</body>
</html>
