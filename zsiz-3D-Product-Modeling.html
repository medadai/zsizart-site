<!DOCTYPE html>
<html lang="en" oncontextmenu="return false">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>ZSIZART — 3D Product Modeling</title>
<link rel="icon" href="../assets/favicon.png">

<style>
:root{
  --bg:#0b0d0d;
  --ink:#e9edf0;
  --muted:#9fb3c8;
  --accent1:#ff7a18;
  --accent2:#a855f7;
  --max:1500px;
}

*{box-sizing:border-box}

body{
  margin:0;
  background:var(--bg);
  color:var(--ink);
  font:16px/1.6 system-ui,Segoe UI,Roboto,Helvetica,Arial;
  overflow-x:hidden;
  -webkit-tap-highlight-color: transparent;
}

img{display:block;max-width:100%}
a{color:inherit;text-decoration:none}

.wrap{max-width:var(--max);margin:auto;padding:10px}

/* ===== Header ===== */
header{
  position:sticky;top:0;z-index:70;
  background:rgba(5,7,9,.92);
  backdrop-filter:saturate(160%) blur(10px);
  border-bottom:1px solid #0e1116;
  box-shadow:0 8px 30px rgba(0,0,0,.35);
}

header .wrap{padding:18px 32px}

.header-layout{
  display:flex;
  align-items:center;
  justify-content:space-between;
}

.brand{
  display:flex;
  align-items:center;
  gap:14px;
}

.brand .logo{height:48px}

.brand .wordmark{
  font-weight:800;
  letter-spacing:.08em;
  font-size:20px;
}

/* ===== Menu Button ===== */
.menu-btn{
  width:44px;height:34px;border:none;background:transparent;color:#cfe2ff;
  display:flex;align-items:center;justify-content:center;cursor:pointer
}
.menu-btn .bars,
.menu-btn .bars::before,
.menu-btn .bars::after{
  content:"";display:block;width:20px;height:2.5px;background:#cfe2ff;border-radius:2px;
  position:relative;transition:.25s
}
.menu-btn .bars::before{position:absolute;top:-7px}
.menu-btn .bars::after{position:absolute;top:7px}

/* ===== Overlay Menu ===== */
.overlay{
  position:fixed;inset:0;background:rgba(0,0,0,.4);
  opacity:0;pointer-events:none;transition:.3s;z-index:80
}
.menu-panel{
  position:fixed;top:0;right:0;height:100%;width:min(360px,90vw);
  background:#0b0d0d;border-left:1px solid #1a1f27;
  transform:translateX(100%);transition:.35s;z-index:90;
  display:flex;flex-direction:column;padding:60px 28px
}
.menu-panel a{
  font-size:20px;font-weight:700;color:#fff;margin:14px 0;
  transition:color .25s ease
}
.menu-panel a:hover{color:var(--accent1)}
.menu-open .overlay{opacity:1;pointer-events:auto}
.menu-open .menu-panel{transform:translateX(0)}

/* ===== Scroll Behavior ===== */
main{
  scroll-snap-type:y proximity;
}

/* ===== Section Transition ===== */
.project-row{
  min-height:85vh;
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:12px;
  padding:20px 2vw;
  align-items:center;
  scroll-snap-align:start;

  opacity:0;
  transform:translateY(60px);
  transition:opacity .7s ease, transform .7s ease;
}

.project-row.in-view{
  opacity:1;
  transform:translateY(0);
}

@media(max-width:900px){
  .project-row{
    grid-template-columns:1fr;
    gap:10px;
    min-height:80vh;
  }
}

/* ===== Image Compare ===== */
.stack{
  position:relative;
  cursor:pointer;
  display:flex;
  align-items:center;
  justify-content:center;
}

.layer{position:relative}

.layer img{
  width:100%;
  max-height:85vh;
  object-fit:contain;
  user-select:none;
  pointer-events:none;
}

.img-render{opacity:1}

.img-clay{
  position:absolute;
  inset:0;
  opacity:0;
  transition:opacity .4s ease;
}

@media(hover:hover){
  .stack:hover .img-clay{opacity:1}
}

.stack.is-compare .img-clay{opacity:1}
</style>
</head>

<body>

<header>
  <div class="wrap header-layout">
    <div class="brand">
      <img src="../assets/logo.png" alt="ZSIZART Logo" class="logo">
      <span class="wordmark">ZSIZART</span>
    </div>
    <button class="menu-btn" id="menuBtn">
      <span class="bars"></span>
    </button>
  </div>
</header>

<div class="overlay" id="overlay"></div>
<aside class="menu-panel" id="menuPanel">
  <a href="../index.html#work">Work</a>
  <a href="../index.html#services">Services</a>
  <a href="../index.html#art">Art</a>
  <a href="../index.html#about">About</a>
  <a href="../index.html#contact">Contact</a>
</aside>

<main class="wrap">

<section class="project-row">
  <div class="stack">
    <div class="layer">
      <img class="img-render" src="../assets/modeling-render01.webp" loading="lazy">
      <img class="img-clay" src="../assets/modeling-clay01.webp" loading="lazy">
    </div>
  </div>
  <div class="stack">
    <div class="layer">
      <img class="img-render" src="../assets/modeling-render02.webp" loading="lazy">
      <img class="img-clay" src="../assets/modeling-clay02.webp" loading="lazy">
    </div>
  </div>
</section>

<!-- باقي السكاشن كما هي -->

</main>

<script>
/* ===== Menu ===== */
const body=document.body,
menuBtn=document.getElementById('menuBtn'),
overlay=document.getElementById('overlay'),
menuPanel=document.getElementById('menuPanel');

menuBtn.addEventListener('click',()=>body.classList.toggle('menu-open'));
overlay.addEventListener('click',()=>body.classList.remove('menu-open'));
menuPanel.addEventListener('click',e=>{
  if(e.target.tagName==='A') body.classList.remove('menu-open');
});

/* ===== Scroll Animation ===== */
const sections=document.querySelectorAll(".project-row");

const observer=new IntersectionObserver(entries=>{
  entries.forEach(entry=>{
    if(entry.isIntersecting){
      entry.target.classList.add("in-view");
    }else{
      entry.target.classList.remove("in-view");
    }
  });
},{threshold:0.35});

sections.forEach(section=>observer.observe(section));

/* ===== Tap Compare ===== */
document.querySelectorAll(".stack").forEach(card=>{
  card.addEventListener("click",()=>{
    card.classList.toggle("is-compare");
  });
});
</script>

</body>
</html>
