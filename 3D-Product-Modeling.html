  <style>
    /* Page-specific layout (keeps your compare effect) */
    .page{
      padding:70px 0 30px;
    }
    .page h1{
      margin:0;
      font-size:56px;
      line-height:1.05;
      font-weight:800;
      letter-spacing:-.03em;
      max-width:18ch;
    }
    .page p{
      margin:14px 0 0;
      font-size:18px;
      color:var(--muted);
      max-width:62ch;
    }

    .project-row{
      position:relative;
      min-height:70vh;
      display:grid;
      grid-template-columns:repeat(2,1fr);
      gap:20px;
      padding:40px 0;
      align-items:center;

      opacity:0;
      transform:translateY(140px);
      transition:
        transform 1s cubic-bezier(.22,.7,.2,1),
        opacity .9s ease;
      will-change:transform,opacity;
    }
    .project-row.in-view{
      opacity:1;
      transform:translateY(0);
    }
    .project-row.out-view{
      opacity:0;
      transform:translateY(-120px);
      transition:
        transform .8s cubic-bezier(.4,0,.2,1),
        opacity .6s ease;
    }

    @media(max-width:900px){
      .project-row{
        grid-template-columns:1fr;
        min-height:auto;
        padding:26px 0;
      }
      .layer img{height:52vh}
      .page h1{font-size:40px}
    }

    .stack{position:relative;cursor:pointer}
    .layer{position:relative;border:1px solid var(--line);border-radius:16px;padding:10px;background:#fff}
    .layer img{
      width:100%;
      height:62vh;
      object-fit:contain;
    }

    .img-clay{
      position:absolute;
      inset:10px; /* matches padding */
      width:calc(100% - 20px);
      height:calc(100% - 20px);
      opacity:0;
      transition:opacity .35s ease;
      pointer-events:none;
    }
    .stack:hover .img-clay{opacity:1}
    .stack.is-compare .img-clay{opacity:1}
  </style>
</head>

<script>
const body=document.body;
const menuBtn=document.getElementById('menuBtn');
const overlay=document.getElementById('overlay');
const menuPanel=document.getElementById('menuPanel');

function openMenu(){ body.classList.add('menu-open'); menuBtn?.setAttribute('aria-expanded','true'); }
function closeMenu(){ body.classList.remove('menu-open'); menuBtn?.setAttribute('aria-expanded','false'); }

menuBtn?.addEventListener('click', ()=> body.classList.contains('menu-open') ? closeMenu() : openMenu());
overlay?.addEventListener('click', closeMenu);
menuPanel?.addEventListener('click', (e)=>{ if(e.target.tagName==='A') closeMenu(); });

const sections=document.querySelectorAll(".project-row");
const observer=new IntersectionObserver(entries=>{
  entries.forEach(entry=>{
    if(entry.isIntersecting){
      entry.target.classList.add("in-view");
      entry.target.classList.remove("out-view");
    } else {
      if(entry.boundingClientRect.top < 0) entry.target.classList.add("out-view");
      entry.target.classList.remove("in-view");
    }
  });
},{
  threshold:0.25,
  rootMargin:"-20% 0px -20% 0px"
});
sections.forEach(section=>observer.observe(section));

document.querySelectorAll(".stack").forEach(card=>{
  card.addEventListener("click",()=>{ card.classList.toggle("is-compare"); });
});
</script>
