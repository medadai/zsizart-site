<!DOCTYPE html>
<html lang="en" oncontextmenu="return false">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>ZSIZART — Work</title>

  <link rel="canonical" href="https://zsizart.com/work">
  <meta name="robots" content="index, follow">
  <meta name="description" content="Selected architectural visualization work by ZSIZART Studio for real estate and interior design." />
  <meta name="theme-color" content="#0b0d0d" />

  <!-- Font -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

  <!-- Favicon -->
  <link rel="icon" type="image/png" sizes="32x32" href="assets/favicon.png">
  <link rel="icon" type="image/x-icon" href="assets/favicon.ico">

  <!-- Lenis Smooth Scrolling -->
  <script defer src="https://cdn.jsdelivr.net/gh/studio-freight/lenis@1.0.29/dist/lenis.min.js"></script>

  <style>
    :root{
      --bg:#f5f5f4;
      --card:#ffffff;
      --ink:#0b0d0d;
      --muted:#6b7280;
      --accent1:#111827;
      --accent2:#111827;
      --radius:18px;
      --shadow:0 12px 40px rgba(0,0,0,.08);
      --max:1160px;

      --pv-dur:.45s;
      --pv-ease:cubic-bezier(.4,.14,.3,1);
    }

    *{box-sizing:border-box}
    *{caret-color:transparent}
    input,textarea,select{caret-color:auto}

    html{scroll-behavior:smooth}
    html.lenis,html.lenis body{height:auto}
    .lenis.lenis-smooth{scroll-behavior:unset}

    body{
      margin:0;
      background:var(--bg);
      color:var(--ink);
      font:16px/1.6 "Inter", system-ui, Segoe UI, Roboto, Helvetica, Arial;
      overflow-x:hidden;
      -webkit-tap-highlight-color: transparent;
    }

    img{display:block;max-width:100%}
    a{color:inherit;text-decoration:none}
    .wrap{max-width:var(--max);margin:auto;padding:28px}

    /* ===== Header ===== */
    .site-header{
      position:sticky;
      top:0;
      z-index:70;
      background:rgba(255,255,255,.78);
      backdrop-filter:saturate(160%) blur(10px);
      border-bottom:1px solid rgba(0,0,0,.08);
      box-shadow:0 8px 30px rgba(0,0,0,.08);
    }
    .site-header .wrap{ padding:18px 32px; }

    .header-layout{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:22px;
    }

    .brand{
      display:flex;
      align-items:center;
      gap:12px;
      user-select:none;
      white-space:nowrap;
    }
    .brand .logo{height:34px;width:auto;}
    .brand .wordmark{
      font-weight:500;
      letter-spacing:.14em;
      font-size:13px;
      text-transform:uppercase;
      color:var(--ink);
    }

    .nav{
      display:flex;
      align-items:center;
      gap:22px;
      min-width:0;
    }
    .nav-link{
      font-size:13px;
      font-weight:500;
      letter-spacing:.02em;
      color:rgba(11,13,13,.78);
      padding:8px 2px;
      white-space:nowrap;
    }
    .nav-link:hover{ color:var(--ink); }

    .cta{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      height:38px;
      padding:0 14px;
      border-radius:999px;
      border:1px solid rgba(0,0,0,.14);
      background:rgba(0,0,0,.04);
      color:var(--ink);
      font-size:13px;
      font-weight:600;
      letter-spacing:.02em;
      white-space:nowrap;
    }
    .cta:hover{
      background:rgba(0,0,0,.06);
      border-color:rgba(0,0,0,.18);
    }

    @media (max-width: 860px){
      .nav{
        gap:14px;
        overflow:auto;
        -webkit-overflow-scrolling:touch;
        scrollbar-width:none;
      }
      .nav::-webkit-scrollbar{ display:none; }
      .cta{ display:none; }
    }

    /* ===== Page head ===== */
    .page-head{ padding:18px 0 6px; }
    .page-kicker{
      color:var(--muted);
      font-size:13px;
      letter-spacing:.06em;
      text-transform:uppercase;
      margin:0 0 10px;
    }
    .page-title{
      font-size:34px;
      line-height:1.15;
      letter-spacing:-0.02em;
      margin:0;
      font-weight:700;
    }
    .page-sub{
      margin:10px 0 0;
      color:rgba(11,13,13,.72);
      max-width:72ch;
    }

    /* ===== Filter Panel ===== */
    .filter-panel{
      position:sticky;
      top:64px;
      z-index:60;
      margin:18px 0 0 0;
      background:rgba(255,255,255,.75);
      border:1px solid rgba(0,0,0,.10);
      border-radius:14px;
      padding:14px;
      display:none;
      backdrop-filter:saturate(160%) blur(10px);
    }
    .filter-panel.show{display:block}
    .filter-row{
      display:flex;
      flex-wrap:wrap;
      gap:12px;
      align-items:center
    }
    .chip{
      display:inline-flex;
      align-items:center;
      gap:8px;
      padding:8px 12px;
      border:1px solid rgba(0,0,0,.10);
      border-radius:12px;
      background:rgba(0,0,0,.04);
      color:var(--ink);
      cursor:pointer;
      user-select:none
    }
    .chip input{accent-color:#111827}
    .search-input{
      flex:1;
      min-width:220px;
      padding:10px 12px;
      border:1px solid rgba(0,0,0,.12);
      border-radius:10px;
      background:#fff;
      color:var(--ink)
    }
    .filter-actions{
      margin-left:auto;
      display:flex;
      gap:10px
    }
    .btn{
      padding:10px 12px;
      border-radius:10px;
      border:1px solid rgba(0,0,0,.12);
      background:#fff;
      cursor:pointer;
      font-weight:600;
    }
    .btn.primary{
      background:linear-gradient(135deg,var(--accent1),var(--accent2));
      border-color:transparent;
      color:#fff;
    }

    /* ===== Section headings row ===== */
    .section-row{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:14px
    }
    .inline-btn{
      padding:8px 12px;
      border-radius:10px;
      border:1px solid rgba(0,0,0,.12);
      background:#fff;
      color:#111827;
      font-weight:700;
      cursor:pointer
    }

    /* ===== Grid ===== */
    section h2{
      margin:26px 0 18px;
      font-size:28px;
      font-weight:700
    }

    .grid{
      display:grid;
      gap:18px;
      grid-template-columns:repeat(2,1fr);
    }
    @media(max-width:768px){ .grid{grid-template-columns:1fr;} }

    .tile{
      position:relative;
      overflow:hidden;
      background:transparent;
      cursor:pointer;
      border:none;
      border-radius:0;
      box-shadow:none;
    }

    .label{
      position:absolute;
      left:10px;
      top:10px;
      background:rgba(255,255,255,.9);
      border:1px solid rgba(0,0,0,.10);
      color:var(--ink);
      padding:4px 8px;
      border-radius:10px;
      font-size:12px
    }

    .img-main{
      width:100%;
      height:auto;
      object-fit:cover;
      display:block;
    }

    /* ===== Footer ===== */
    footer{
      border-top:1px solid rgba(0,0,0,.10);
      color:var(--muted);
      padding:20px;
      text-align:center;
      margin-top:18px;
    }

    /* ===========================================
       PROJECT VIEWER (WHITE + SMALL FRAME + SIDE)
       =========================================== */

    .pv{
      position:fixed;
      inset:0;
      z-index:200;
      background:#fff;
      opacity:0;
      pointer-events:none;
      transition:opacity var(--pv-dur) var(--pv-ease);
    }
    .pv.show{opacity:1;pointer-events:auto}
    .pv__content{position:relative;width:100%;height:100%}

    .pv__close{
      position:absolute;
      top:18px; left:18px;
      width:42px; height:42px;
      border-radius:12px;
      background:rgba(0,0,0,.06);
      border:1px solid rgba(0,0,0,.10);
      color:#111;
      font-size:26px;
      line-height:1;
      cursor:pointer;
      display:flex;
      align-items:center;
      justify-content:center;
      z-index:30;
    }

    .pv__stage{
      position:absolute;
      left:0; right:0;
      top:0;
      bottom:150px;
      display:grid;
      grid-template-columns:minmax(280px, 860px) minmax(260px, 380px);
      gap:24px;
      align-items:center;
      justify-content:center;
      padding:72px 28px 24px;
    }
    @media(max-width:980px){
      .pv__stage{
        grid-template-columns:1fr;
        bottom:180px;
        padding:66px 18px 18px;
      }
    }

    .pv__frame{
      position:relative;
      width:min(860px, 100%);
      aspect-ratio:16/9;
      border-radius:18px;
      background:#f5f5f4;
      border:1px solid rgba(0,0,0,.10);
      box-shadow:0 18px 70px rgba(0,0,0,.14);
      overflow:hidden;
    }

    .pv__img{
      position:absolute;
      inset:0;
      width:100%;
      height:100%;
      object-fit:cover;
      opacity:0;
      transition:opacity .28s ease; /* أقرب لنام */
      will-change:opacity;
    }
    .pv__img.is-top{opacity:1}

    .pv__arrow{
      position:absolute;
      top:50%;
      transform:translateY(-50%);
      width:54px;
      height:54px;
      font-size:40px;
      border-radius:50%;
      border:1px solid rgba(0,0,0,.10);
      cursor:pointer;
      background:rgba(255,255,255,.78);
      color:#111;
      z-index:10;
      backdrop-filter: blur(8px);
      transition:.2s;
    }
    .pv__arrow:hover{ background:rgba(255,255,255,.92); }
    .pv__prev{ left:12px; }
    .pv__next{ right:12px; }

    .pv__side{
      width:min(380px, 100%);
    }
    .pv__side-card{
      border-radius:18px;
      background:#fff;
      border:1px solid rgba(0,0,0,.10);
      box-shadow:0 18px 70px rgba(0,0,0,.10);
      padding:18px 18px 16px;
    }
    .pv__side-title{
      font-weight:800;
      font-size:16px;
      line-height:1.25;
      margin:0 0 10px;
      color:#0b0d0d;
    }
    .pv__side-loc{
      font-weight:600;
      font-size:12px;
      letter-spacing:.08em;
      text-transform:uppercase;
      color:rgba(11,13,13,.55);
      margin:0 0 12px;
    }
    .pv__side-desc{
      font-size:13px;
      line-height:1.55;
      color:rgba(11,13,13,.75);
      margin:0;
    }

    /* ===== More projects (BIG + SLOW) ===== */
    .pv__more{
      position:absolute;
      left:0;
      right:0;
      bottom:20px;
      z-index:25;
      padding:0 32px;
      pointer-events:auto;
    }

    /* موجود في HTML عندك */
    .pv__more-head{
      display:flex;
      align-items:center;
      justify-content:space-between;
      margin:0 0 14px;
    }

    .pv__more-label{
      font-size:13px;
      font-weight:700;
      letter-spacing:.12em;
      text-transform:uppercase;
      color:rgba(0,0,0,.55);
      margin:0;
    }

    /* ====== مهم: Rail زي NAM (بدون marquee auto) ====== */
    .pv__rail{
      overflow-x:auto;
      overflow-y:hidden;
      -webkit-overflow-scrolling:touch;
      scrollbar-width:none;
      border-radius:20px;
      border:1px solid rgba(0,0,0,.10);
      background:#fff;
      box-shadow:0 20px 60px rgba(0,0,0,.10);
    }
    .pv__rail::-webkit-scrollbar{ display:none; }

    .pv__rail-inner{
      display:flex;
      align-items:center;
      gap:18px;
      padding:18px;
      width:max-content;
      scroll-snap-type:x mandatory;
    }

    /* كروت الـthumb */
    .pv__thumb{
  scroll-snap-align:start;
  display:flex;
  align-items:center;
  gap:14px;
  padding:14px 16px;
  border-radius:18px;
  border:1px solid rgba(0,0,0,.08);
  background:#fafafa;
  cursor:pointer;
  min-width:420px;
  max-width:480px;
  user-select:none;
  transition:none;            /* شيل الأنيميشن */
}

.pv__thumb:hover{
  transform:none;             /* شيل الحركة */
  box-shadow:none;            /* شيل الظل الإضافي */
  background:#fafafa;         /* خليه ثابت */
}
    .pv__thumb img{
      width:120px;
      height:80px;
      object-fit:cover;
      border-radius:14px;
      border:1px solid rgba(0,0,0,.08);
      flex:0 0 auto;
    }
    .pv__thumb .t1{
      color:#0b0d0d;
      font-weight:800;
      font-size:14px;
      line-height:1.2;
      margin:0 0 6px;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }
    .pv__thumb .t2{
      color:rgba(11,13,13,.65);
      font-size:13px;
      line-height:1.3;
      margin:0;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }

    @media(max-width:1000px){
      .pv__more{ padding:0 18px; }
      .pv__rail-inner{ padding:14px; gap:14px; }
      .pv__thumb{ min-width:320px; max-width:360px; }
      .pv__thumb img{ width:96px; height:64px; }
      .pv__thumb .t1{ font-size:13px; }
      .pv__thumb .t2{ font-size:12px; }
    }

    /* ===== FLIP Ghost (NAM transition) ===== */
    .pv__ghost{
      position:fixed;
      left:0;
      top:0;
      width:10px;
      height:10px;
      object-fit:cover;
      z-index:260;
      pointer-events:none;
      will-change:transform, border-radius, opacity;
      box-shadow:0 28px 90px rgba(0,0,0,.12);
    }

    /* ====== (CSS القديم بتاع marquee سيبه زي ما هو لو عايزه لاحقاً) ====== */
    .pv__marquee{ overflow:hidden; border-radius:20px; border:1px solid rgba(0,0,0,.10); background:#fff; box-shadow:0 20px 60px rgba(0,0,0,.10); }
    .pv__marquee-track{ display:flex; align-items:center; gap:18px; padding:18px; width:max-content; animation: pvMarquee 75s linear infinite; }
    .pv__marquee:hover .pv__marquee-track{ animation-play-state:paused; }
    @keyframes pvMarquee{ from{ transform:translateX(0); } to{ transform:translateX(-50%); } }
  </style>
</head>

<body>
  <header class="site-header">
    <div class="wrap header-layout">
      <a class="brand" href="/">
        <img src="assets/logo.png" alt="ZSIZART Logo" class="logo" width="34" height="34" loading="eager" decoding="async">
        <span class="wordmark">ZSIZART</span>
      </a>

      <nav class="nav" aria-label="Primary">
        <a class="nav-link" href="/work.html">Work</a>
        <a class="nav-link" href="/services.html">Services</a>
        <a class="nav-link" href="/art.html">Art</a>
        <a class="nav-link" href="/studio.html">Studio</a>
        <a class="nav-link" href="/contact.html">Contact</a>
      </nav>

      <a class="cta" href="/contact.html">Start a Project</a>
    </div>
  </header>

  <main class="wrap">
    <section class="page-head" aria-label="Page intro">
      <p class="page-kicker">Selected</p>
      <h1 class="page-title">Work</h1>
      <p class="page-sub">Architectural visualization for real estate developers and interior designers.</p>
    </section>

    <!-- Filter Panel -->
    <section id="filters" class="filter-panel" aria-label="Search and filter">
      <form id="filterForm" onsubmit="return false;">
        <div class="filter-row">
          <input class="search-input" type="search" id="q" placeholder="Search projects by name…" />
          <label class="chip"><input type="checkbox" id="tagInterior" /> INTERIOR</label>
          <label class="chip"><input type="checkbox" id="tagExterior" /> EXTERIOR</label>
          <div class="filter-actions">
            <button type="button" class="btn" id="resetBtn">Reset</button>
            <button type="button" class="btn primary" id="applyBtn">Apply</button>
          </div>
        </div>
      </form>
    </section>

    <section aria-label="Projects">
      <div class="section-row">
        <h2>Projects</h2>
        <button class="inline-btn" id="filterToggle" type="button">Search & Filter</button>
      </div>

      <div class="grid" id="grid">
        <div class="tile"
             data-project="assets/work-01"
             data-title="Verde Crest Villas"
             data-loc="Dubai"
             data-desc="Luxury Residential Development — Concept & Visualization."
             data-tags="exterior">
          <span class="label">EXTERIOR</span>
          <img class="img-main" src="assets/work-01.webp" width="1600" height="900" loading="eager" fetchpriority="high" decoding="async" alt="Verde Crest Villas">
        </div>

        <div class="tile"
             data-project="assets/work-02"
             data-title="Hillside Serenity"
             data-loc="California"
             data-desc="A modern retreat in nature blending architecture and landscape."
             data-tags="exterior">
          <span class="label">EXTERIOR</span>
          <img class="img-main" src="assets/work-02.webp" width="1600" height="900" loading="lazy" decoding="async" alt="Hillside Serenity">
        </div>

        <div class="tile"
             data-project="assets/work-03"
             data-title="Retro Home Sweet"
             data-loc="London"
             data-desc="Interior CGI capturing warmth of retro modern living."
             data-tags="interior">
          <span class="label">INTERIOR</span>
          <img class="img-main" src="assets/work-03.webp" width="1600" height="900" loading="lazy" decoding="async" alt="Retro Home Sweet">
        </div>

        <div class="tile"
             data-project="assets/work-04"
             data-title="Serene Lines"
             data-loc="Copenhagen"
             data-desc="Interior CGI focused on light, material and calm composition."
             data-tags="interior">
          <span class="label">INTERIOR</span>
          <img class="img-main" src="assets/work-04.webp" width="1600" height="900" loading="lazy" decoding="async" alt="Serene Lines">
        </div>

        <div class="tile"
             data-project="assets/work-05"
             data-title="Modern Haven"
             data-loc="Amsterdam"
             data-desc="Interior CGI capturing warmth of modern living."
             data-tags="interior">
          <span class="label">INTERIOR</span>
          <img class="img-main" src="assets/work-05.webp" width="1600" height="900" loading="lazy" decoding="async" alt="Modern Haven">
        </div>
      </div>
    </section>
  </main>

  <footer>© 2026 ZSIZART Studio — Architectural Visualization & CGI</footer>

  <!-- Project Viewer -->
  <div class="pv" id="pv" aria-hidden="true" role="dialog" aria-label="Project viewer">
    <div class="pv__content">
      <button class="pv__close" id="pvClose" aria-label="Close viewer">×</button>

      <div class="pv__stage">
        <div class="pv__frame" id="pvFrame">
          <button class="pv__arrow pv__prev" id="pvPrev" aria-label="Previous image">‹</button>

          <img id="pvImageA" class="pv__img is-top" alt="">
          <img id="pvImageB" class="pv__img" alt="">

          <button class="pv__arrow pv__next" id="pvNext" aria-label="Next image">›</button>
        </div>

        <aside class="pv__side" aria-live="polite">
          <div class="pv__side-card">
            <div class="pv__side-title" id="pvTitle"></div>
            <div class="pv__side-loc" id="pvLoc"></div>
            <p class="pv__side-desc" id="pvDesc"></p>
          </div>
        </aside>
      </div>

      <section class="pv__more" aria-label="More projects">
        <div class="pv__more-head">
          <div class="pv__more-label">More projects</div>
        </div>

        <div class="pv__rail" id="pvRail" tabindex="0" aria-label="More projects rail">
          <div class="pv__rail-inner" id="pvRailInner"></div>
        </div>
      </section>
    </div>
  </div>

  <script>
    /* ===== Lenis ===== */
    let lenis;
    function initLenis(){
      const prefersReducedMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
      if (prefersReducedMotion) return;
      if (!window.Lenis) return;

      lenis = new Lenis({
        duration:1.2,
        easing:(t)=>Math.min(1,1.001 - Math.pow(2, -10*t)),
        direction:'vertical',
        gestureDirection:'vertical',
        smooth:true, mouseMultiplier:1, smoothTouch:false, touchMultiplier:2, infinite:false,
      });

      function raf(time){ lenis.raf(time); requestAnimationFrame(raf); }
      requestAnimationFrame(raf);
    }
    window.addEventListener('load', initLenis);

    /* ===== Filter Panel ===== */
    const filterToggle=document.getElementById('filterToggle');
    const filterPanel=document.getElementById('filters');
    filterToggle?.addEventListener('click',()=>filterPanel.classList.toggle('show'));

    /* ===== Filtering ===== */
    const applyBtn=document.getElementById('applyBtn');
    const resetBtn=document.getElementById('resetBtn');
    const qInput=document.getElementById('q');
    const chkInt=document.getElementById('tagInterior');
    const chkExt=document.getElementById('tagExterior');
    const tiles=[...document.querySelectorAll('#grid .tile')];

    function applyFilters(){
      const q=(qInput?.value||'').trim().toLowerCase();
      const wantInt=!!chkInt?.checked, wantExt=!!chkExt?.checked;

      tiles.forEach(tile=>{
        const name=(tile.dataset.title||'').toLowerCase();
        const tags=(tile.dataset.tags||'').toLowerCase();
        const matchText = q ? name.includes(q) : true;

        let matchCat = true;
        if (wantInt || wantExt){
          matchCat = (wantInt && tags.includes('interior')) || (wantExt && tags.includes('exterior'));
        }

        tile.style.display = (matchText && matchCat) ? '' : 'none';
      });
    }

    function resetFilters(){
      if(qInput) qInput.value='';
      if(chkInt) chkInt.checked=false;
      if(chkExt) chkExt.checked=false;
      tiles.forEach(t=>t.style.display='');
    }

    applyBtn?.addEventListener('click',applyFilters);
    resetBtn?.addEventListener('click',resetFilters);
    qInput?.addEventListener('keydown',e=>{ if(e.key==='Enter'){ e.preventDefault(); applyFilters(); }});

    /* ===== Project Viewer (NAM-like FLIP + rail) ===== */
    (function(){
      const viewer  = document.getElementById('pv');
      const frame   = document.getElementById('pvFrame');

      const imgA    = document.getElementById('pvImageA');
      const imgB    = document.getElementById('pvImageB');

      const titleEl = document.getElementById('pvTitle');
      const locEl   = document.getElementById('pvLoc');
      const descEl  = document.getElementById('pvDesc');

      const btnClose= document.getElementById('pvClose');
      const btnPrev = document.getElementById('pvPrev');
      const btnNext = document.getElementById('pvNext');

      const railInner = document.getElementById('pvRailInner');

      const projectTiles = [...document.querySelectorAll('#grid .tile')];

      const projects = projectTiles.map((t, i) => ({
        index:i,
        base:t.dataset.project || '',
        title:t.dataset.title || '',
        loc:t.dataset.loc || '',
        desc:t.dataset.desc || '',
        cover:t.querySelector('img')?.getAttribute('src') || ''
      }));

      const prefersReducedMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

      let list = [];
      let idx = 0;
      let topIsA = true;

      const cache = new Map();
      let lastTileImg = null;
      let ghost = null;

      function lockScroll(){
        document.body.style.overflow='hidden';
        if (lenis) lenis.stop();
      }
      function unlockScroll(){
        document.body.style.overflow='';
        if (lenis) lenis.start();
      }

      function showViewer(){
        viewer.classList.add('show');
        viewer.setAttribute('aria-hidden','false');
        lockScroll();
      }
      function hideViewer(){
        viewer.classList.remove('show');
        viewer.setAttribute('aria-hidden','true');
        unlockScroll();
      }

      function updateArrows(){
        const multi = list.length > 1;
        btnPrev.style.display = multi ? '' : 'none';
        btnNext.style.display = multi ? '' : 'none';
      }

      function setInfo(p){
        titleEl.textContent = p.title || '';
        locEl.textContent   = p.loc || '';
        descEl.textContent  = p.desc || '';
      }

      function crossfadeTo(src){
        const top   = topIsA ? imgA : imgB;
        const under = topIsA ? imgB : imgA;

        under.onload = () => {
          top.classList.remove('is-top');
          under.classList.add('is-top');
          topIsA = !topIsA;
          under.onload = null;
        };
        under.src = src;
      }

      function setIdx(i){
        if (!list.length) return;
        idx = (i + list.length) % list.length;
        crossfadeTo(list[idx]);
      }

      btnNext.addEventListener('click', (e)=>{ e.preventDefault(); e.stopPropagation(); setIdx(idx+1); });
      btnPrev.addEventListener('click', (e)=>{ e.preventDefault(); e.stopPropagation(); setIdx(idx-1); });

      async function buildList(base){
        if (cache.has(base)) return cache.get(base);

        const exts = ['.webp','.jpg','.jpeg','.png'];
        const tryList = [];

        exts.forEach(ext => tryList.push(`${base}${ext}`));
        for(let i=1;i<=20;i++){
          const p2 = String(i).padStart(2,'0');
          exts.forEach(ext=>{
            tryList.push(`${base}-${p2}${ext}`);
            tryList.push(`${base}-${i}${ext}`);
          });
        }

        const checks = tryList.map(src=>new Promise(res=>{
          const im = new Image();
          im.onload  = ()=>res(src);
          im.onerror = ()=>res(null);
          im.src = src;
        }));

        const found = (await Promise.all(checks)).filter(Boolean);
        const finalList = found.length ? found : [`${base}.webp`];

        cache.set(base, finalList);
        return finalList;
      }

      function escapeHtml(s){
        return String(s||'')
          .replaceAll('&','&amp;')
          .replaceAll('<','&lt;')
          .replaceAll('>','&gt;')
          .replaceAll('"','&quot;')
          .replaceAll("'","&#039;");
      }

      function renderRail(){
        const html = projects.map(p => `
          <div class="pv__thumb" data-open="${p.index}" role="button" tabindex="0">
            <img src="${p.cover}" alt="">
            <div>
              <p class="t1">${escapeHtml(p.title)}</p>
              <p class="t2">${escapeHtml(p.loc || p.desc)}</p>
            </div>
          </div>
        `).join('');

        railInner.innerHTML = html;

        railInner.querySelectorAll('.pv__thumb').forEach(el=>{
          const open = async ()=>{
            const i = Number(el.getAttribute('data-open'));
            if (!Number.isFinite(i)) return;
            await openProject(i, null, true);
          };

          el.addEventListener('click', (e)=>{ e.stopPropagation(); open(); });
          el.addEventListener('keydown', (e)=>{ if(e.key==='Enter'){ e.preventDefault(); e.stopPropagation(); open(); }});
        });
      }

      function cleanupGhost(){
        if (ghost){ ghost.remove(); ghost = null; }
      }

      function createGhostFrom(img){
        if (!img) return null;
        const r = img.getBoundingClientRect();
        const g = document.createElement('img');
        g.className = 'pv__ghost';
        g.src = img.currentSrc || img.src;
        g.style.left = r.left + 'px';
        g.style.top  = r.top  + 'px';
        g.style.width  = r.width + 'px';
        g.style.height = r.height + 'px';
        g.style.borderRadius = getComputedStyle(img).borderRadius || '0px';
        document.body.appendChild(g);
        return g;
      }

      async function flipOpen(fromImg){
        if (prefersReducedMotion) return;

        cleanupGhost();
        ghost = createGhostFrom(fromImg);
        if (!ghost) return;

        const r0 = fromImg.getBoundingClientRect();
        const r1 = frame.getBoundingClientRect();

        const dx = r1.left - r0.left;
        const dy = r1.top  - r0.top;
        const sx = r1.width  / r0.width;
        const sy = r1.height / r0.height;

        ghost.style.transformOrigin = 'top left';

        imgA.style.opacity = '0';
        imgB.style.opacity = '0';

        const anim = ghost.animate([
          { transform:'translate(0,0) scale(1,1)', borderRadius: ghost.style.borderRadius, opacity:1 },
          { transform:`translate(${dx}px,${dy}px) scale(${sx},${sy})`, borderRadius:'18px', opacity:1 }
        ],{
          duration: 520,
          easing: 'cubic-bezier(.2,.8,.2,1)',
          fill: 'forwards'
        });

        await anim.finished.catch(()=>{});

        imgA.style.opacity = '';
        imgB.style.opacity = '';
        cleanupGhost();
      }

      async function flipClose(toImg){
        if (prefersReducedMotion || !toImg) { hideViewer(); return; }

        const rFrame = frame.getBoundingClientRect();
        const rTile  = toImg.getBoundingClientRect();

        const topImg = (imgA.classList.contains('is-top') ? imgA : imgB);

        cleanupGhost();
        ghost = document.createElement('img');
        ghost.className = 'pv__ghost';
        ghost.src = topImg.currentSrc || topImg.src || '';
        ghost.style.left = rFrame.left + 'px';
        ghost.style.top  = rFrame.top  + 'px';
        ghost.style.width  = rFrame.width + 'px';
        ghost.style.height = rFrame.height + 'px';
        ghost.style.borderRadius = '18px';
        document.body.appendChild(ghost);

        hideViewer();

        const dx = rTile.left - rFrame.left;
        const dy = rTile.top  - rFrame.top;
        const sx = rTile.width  / rFrame.width;
        const sy = rTile.height / rFrame.height;

        ghost.style.transformOrigin = 'top left';

        const anim = ghost.animate([
          { transform:'translate(0,0) scale(1,1)', borderRadius:'18px', opacity:1 },
          { transform:`translate(${dx}px,${dy}px) scale(${sx},${sy})`, borderRadius: getComputedStyle(toImg).borderRadius || '0px', opacity:1 }
        ],{
          duration: 480,
          easing: 'cubic-bezier(.4,0,.2,1)',
          fill: 'forwards'
        });

        await anim.finished.catch(()=>{});
        cleanupGhost();
      }

      async function openProject(i, clickedTile, keepOpen){
        const p = projects[i];
        if (!p) return;

        setInfo(p);

        list = await buildList(p.base);
        idx = 0;
        topIsA = true;

        imgA.classList.remove('is-top');
        imgB.classList.remove('is-top');
        imgA.src = list[0];
        imgA.classList.add('is-top');

        updateArrows();
        renderRail();

        if (keepOpen) return;

        lastTileImg = clickedTile?.querySelector('img') || null;

        showViewer();

        if (lastTileImg) await flipOpen(lastTileImg);
      }

      async function closeProject(){
        await flipClose(lastTileImg);
      }

      projectTiles.forEach((tile,i)=>{
        tile.addEventListener('click', async ()=>{
          await openProject(i, tile, false);
        });
      });

      btnClose.addEventListener('click', (e)=>{ e.preventDefault(); e.stopPropagation(); closeProject(); });

      viewer.addEventListener('click', (e)=>{
        if (e.target === viewer) closeProject();
      });

      document.addEventListener('keydown', (e)=>{
        if(!viewer.classList.contains('show')) return;
        if(e.key==='Escape') closeProject();
        if(e.key==='ArrowRight') setIdx(idx+1);
        if(e.key==='ArrowLeft')  setIdx(idx-1);
      });
    })();
  </script>
</body>
</html>
