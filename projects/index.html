<!DOCTYPE html>
<html lang="en" oncontextmenu="return false">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Projects — ZSIZART</title>

  <link rel="canonical" href="https://zsizart.com/projects/">
  <meta name="robots" content="index, follow">
  <meta name="description" content="Projects — ZSIZART Studio architectural visualization & CGI.">

  <meta property="og:title" content="Projects — ZSIZART">
  <meta property="og:description" content="Selected architectural visualization projects.">
  <meta property="og:type" content="website">
  <meta property="og:image" content="/assets/og-cover.jpg">

  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="Projects — ZSIZART">
  <meta name="twitter:description" content="Selected architectural visualization projects.">
  <meta name="twitter:image" content="/assets/og-cover.jpg">

  <link rel="preload" as="image" href="/assets/logo.png">
  <link rel="icon" type="image/png" sizes="32x32" href="/assets/favicon.png">
  <link rel="icon" type="image/x-icon" href="/assets/favicon.ico">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="/assets/site.css">
</head>

<body>

<header>
  <div class="wrap header-row">
    <a class="brand" href="/" aria-label="ZSIZART Home">
      <img src="/assets/logo.png" alt="ZSIZART Logo" width="22" height="22" loading="eager" decoding="async">
    </a>

    <nav class="topnav" aria-label="Primary">
      <a href="/projects/">Projects</a>
      <a href="/careers/">Careers</a>
      <a href="/3d-product-modeling/">3D Modeling</a>
      <a class="cta" href="/get-in-touch/">Get in touch</a>
    </nav>

    <button class="menu-btn" id="menuBtn" aria-label="Menu" aria-expanded="false">
      <span class="bars"></span>
    </button>
  </div>
</header>

<div class="overlay" id="overlay"></div>
<aside class="menu-panel" id="menuPanel" aria-label="Site menu">
  <a href="/projects/">Projects</a>
  <a href="/careers/">Careers</a>
  <a href="/3d-product-modeling/">3D Modeling</a>
  <a href="/get-in-touch/">Get in touch</a>
</aside>

<main class="wrap">

  <section class="hero" style="padding:70px 0 34px">
    <h1>Projects</h1>
    <p>Selected work in architectural visualization, CGI, and product imagery.</p>

    <div class="hero-actions">
      <a class="btn" href="/get-in-touch/">Request Proposal</a>
    </div>
  </section>

  <section id="projects">

    <div class="section-row" style="margin-top:10px">
      <h2 style="margin:0;font-size:18px;font-weight:800">Selected</h2>
      <button class="inline-btn" id="filterToggle" type="button">Search & Filter</button>
    </div>

    <!-- Filter Panel -->
    <section id="filters" class="filter-panel" style="margin-top:14px">
      <form id="filterForm" onsubmit="return false;">
        <div class="filter-row">
          <input class="search-input" type="search" id="q" placeholder="Search projects by name…" />
          <label class="chip"><input type="checkbox" id="tagInterior" /> INTERIOR</label>
          <label class="chip"><input type="checkbox" id="tagExterior" /> EXTERIOR</label>
          <div class="filter-actions">
            <button type="button" class="btn" id="resetBtn">Reset</button>
            <button type="button" class="btn primary" id="applyBtn">Apply</button>
          </div>
        </div>
        <div class="hint">Tip: filter by text (project name) and/or category.</div>
      </form>
    </section>

    <div class="grid" id="grid" style="margin-top:18px">
      <a class="tile" href="/projects/verde-crest-villas/" data-title="Verde Crest Villas" data-tags="exterior" aria-label="Open Verde Crest Villas">
        <span class="label">EXTERIOR</span>
        <img class="img-main" src="/assets/work-01.webp" width="1600" height="900" loading="eager" fetchpriority="high" decoding="async" alt="Verde Crest Villas">
      </a>

      <a class="tile" href="/projects/hillside-serenity/" data-title="Hillside Serenity" data-tags="exterior" aria-label="Open Hillside Serenity">
        <span class="label">EXTERIOR</span>
        <img class="img-main" src="/assets/work-02.webp" width="1600" height="900" loading="lazy" decoding="async" alt="Hillside Serenity">
      </a>

      <a class="tile" href="/projects/retro-home-sweet/" data-title="Retro Home Sweet" data-tags="interior" aria-label="Open Retro Home Sweet">
        <span class="label">INTERIOR</span>
        <img class="img-main" src="/assets/work-03.webp" width="1600" height="900" loading="lazy" decoding="async" alt="Retro Home Sweet">
      </a>

      <a class="tile" href="/projects/serene-lines/" data-title="Serene Lines" data-tags="interior" aria-label="Open Serene Lines">
        <span class="label">INTERIOR</span>
        <img class="img-main" src="/assets/work-04.webp" width="1600" height="900" loading="lazy" decoding="async" alt="Serene Lines">
      </a>

      <a class="tile" href="/projects/modern-haven/" data-title="Modern Haven" data-tags="interior" aria-label="Open Modern Haven">
        <span class="label">INTERIOR</span>
        <img class="img-main" src="/assets/work-05.webp" width="1600" height="900" loading="lazy" decoding="async" alt="Modern Haven">
      </a>
    </div>

  </section>

</main>

<script>
const body=document.body;
const menuBtn=document.getElementById('menuBtn');
const overlay=document.getElementById('overlay');
const menuPanel=document.getElementById('menuPanel');

function openMenu(){ body.classList.add('menu-open'); menuBtn?.setAttribute('aria-expanded','true'); }
function closeMenu(){ body.classList.remove('menu-open'); menuBtn?.setAttribute('aria-expanded','false'); }

menuBtn?.addEventListener('click', ()=> body.classList.contains('menu-open') ? closeMenu() : openMenu());
overlay?.addEventListener('click', closeMenu);
menuPanel?.addEventListener('click', (e)=>{ if(e.target.tagName==='A') closeMenu(); });

const filterToggle=document.getElementById('filterToggle');
const filterPanel=document.getElementById('filters');
filterToggle?.addEventListener('click',()=>filterPanel.classList.toggle('show'));

const applyBtn=document.getElementById('applyBtn');
const resetBtn=document.getElementById('resetBtn');
const qInput=document.getElementById('q');
const chkInt=document.getElementById('tagInterior');
const chkExt=document.getElementById('tagExterior');
const tiles=[...document.querySelectorAll('#grid .tile')];

function applyFilters(){
  const q=(qInput?.value||'').trim().toLowerCase();
  const wantInt=!!chkInt?.checked, wantExt=!!chkExt?.checked;

  tiles.forEach(tile=>{
    const name=(tile.dataset.title||'').toLowerCase();
    const tags=(tile.dataset.tags||'').toLowerCase();
    const matchText = q ? name.includes(q) : true;
    let matchCat = true;

    if (wantInt || wantExt){
      matchCat = (wantInt && tags.includes('interior')) || (wantExt && tags.includes('exterior'));
    }
    tile.style.display = (matchText && matchCat) ? '' : 'none';
  });
}
function resetFilters(){
  if(!qInput) return;
  qInput.value='';
  if(chkInt) chkInt.checked=false;
  if(chkExt) chkExt.checked=false;
  tiles.forEach(t=>t.style.display='');
}

applyBtn?.addEventListener('click',applyFilters);
resetBtn?.addEventListener('click',resetFilters);
qInput?.addEventListener('keydown',e=>{ if(e.key==='Enter'){ e.preventDefault(); applyFilters(); }});
</script>

</body>
</html>
